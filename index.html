              <div data-action="goMembers" style="width:64px;height:64px;background:#FFFFFF;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(0,0,0,0.04);flex-shrink:0">
                <svg viewBox="0 0 24 24" style="width:24px;height:24px" fill="none" stroke="#4E5968" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
              </div>

              <!-- 서브 메뉴 탭 아일랜드 박스 (둥근 필 형태) -->
              <div style="flex:1;height:64px;background:#FFFFFF;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-around;padding:0 12px;border:1px solid rgba(0,0,0,0.04)">
                <div data-action="setHome" style="${tabStyle(isHomeActive)}">${iconHtml("home", isHomeActive)}<span>홈</span></div>
                <div data-action="setDiary" style="${tabStyle(d)}">${iconHtml("diary", d)}<span>일지</span></div>
                <div data-action="setExercise" style="${tabStyle(e)}">${iconHtml("exercise", e)}<span>운동</span></div>
                <div data-action="setRoutine" style="${tabStyle(r)}">${iconHtml("routine", r)}<span>루틴</span></div>
              </div>
            </div>
          `;
        }

        const sched = isTabActive("schedule"),
          mem = isTabActive("members"),
          prof = isTabActive("profile");
        // 활성: filled-검정 / 비활성: outlined-회색
        const mainIcon = (name, active) => {
          const c = active ? activeColor : inactiveIconColor;
          const svgAttrs = `viewBox="0 0 24 24" style="width:22px;height:22px;margin-bottom:6px"`;
          if (name === "calendar") {
            return active
              ? `<svg ${svgAttrs}><rect x="2.5" y="4" width="19" height="17" rx="4" fill="${c}"/><line x1="7.5" y1="2.5" x2="7.5" y2="6.5" stroke="${c}" stroke-width="2.2" stroke-linecap="round"/><line x1="16.5" y1="2.5" x2="16.5" y2="6.5" stroke="${c}" stroke-width="2.2" stroke-linecap="round"/><line x1="2.5" y1="9.5" x2="21.5" y2="9.5" stroke="#FFFFFF" stroke-width="1.8"/></svg>`
              : `<svg ${svgAttrs} fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="3.5"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="3.5" y1="10" x2="20.5" y2="10"/></svg>`;
          }
          if (name === "members") {
            return active
              ? `<svg ${svgAttrs} fill="${c}"><circle cx="9" cy="7.5" r="4"/><path d="M1.5 21v-.3a7.5 7.5 0 0 1 15 0v.3Z"/><circle cx="17.5" cy="8.5" r="3"/><path d="M22.5 21h-4.3a9.3 9.3 0 0 0-2.5-6.3 5.5 5.5 0 0 1 6.8 5.3Z"/></svg>`
              : `<svg ${svgAttrs} fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7.5" r="3.5"/><path d="M2.5 20.5v-.5a6.5 6.5 0 0 1 13 0v.5"/><path d="M16 4.6a3.5 3.5 0 0 1 0 6.8"/><path d="M18.5 14.6a6.5 6.5 0 0 1 3 5.4v.5"/></svg>`;
          }
          // profile
          return active
            ? `<svg ${svgAttrs} fill="${c}"><circle cx="12" cy="7.5" r="4.5"/><path d="M3.5 21v-.3a8.5 8.5 0 0 1 17 0v.3Z"/></svg>`
            : `<svg ${svgAttrs} fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="7.5" r="4"/><path d="M4.5 20.5v-.3a7.5 7.5 0 0 1 15 0v.3"/></svg>`;
        };
        return `
  <div style="position:relative;height:68px;background:#FFFFFF;display:grid;grid-template-columns:1fr 1fr 1fr;box-shadow:0 -4px 16px rgba(25,31,40,0.06);flex-shrink:0;z-index:${state.sheet || state.showSpeedDial ? 18 : 25}">
    <div data-action="goSchedule" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0">${mainIcon("calendar", sched)}<span style="font-size:14px;font-weight:600;color:${sched ? activeColor : inactiveTextColor}">일정</span></div>
    <div data-action="goMembers" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0">${mainIcon("members", mem)}<span style="font-size:14px;font-weight:600;color:${mem ? activeColor : inactiveTextColor}">회원</span></div>
    <div data-action="goProfile" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0">${mainIcon("profile", prof)}<span style="font-size:14px;font-weight:600;color:${prof ? activeColor : inactiveTextColor}">내 정보</span></div>
  </div>`;
      }

      /* ---------------- 바텀시트 ---------------- */
      // 트레이너의 빈 슬롯 파생: 확정 수업·상담·개인 일정 제외, 센터 영업시간(06~22) 내 1시간 단위
      function freeSlotsFor(dateKey) {
        const busy = getDayData(dateKey).sessions.map((s) => [
          schedToMin(s.time),
          schedToMin(s.endTime || addOneHour(s.time)),
        ]);
        const out = [];
        for (let h = 6; h < 22; h++) {
          const s = h * 60;
          if (!busy.some(([bs, be]) => bs < s + 60 && be > s))
            out.push(`${String(h).padStart(2, "0")}:00`);
        }
        return out;
      }

      // 회원 시간 선택 화면: 빈 슬롯만 보여줘 핑퐁 원천 차단
      function renderSlotPicker() {
        const dates = Array.from({ length: 7 }, (_, i) =>
          shiftKey(TODAY_DATE, i + 1),
        );
        const dateChips = dates
          .map((key) => {
            const active = key === state.slotPickDate;
            const d = getDayData(key);
            return `
      <span data-action="selectSlotDate:${key}" style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 14px;border-radius:14px;cursor:pointer;background:${active ? "#191F28" : "#F2F4F6"}">
        <span style="font-size:12px;color:${active ? "#B0B8C1" : "#8B95A1"}">${d.weekday}</span>
        <span style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:${active ? "#FFFFFF" : "#191F28"}">${key.split(".")[1]}</span>
      </span>`;
          })
          .join("");

        const slots = freeSlotsFor(state.slotPickDate);
        const slotsHtml = slots.length
          ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${slots
              .map((t) => {
                const active = t === state.slotPickTime;
                return `<span data-action="selectSlotTime:${t}" style="padding:14px 0;border-radius:12px;text-align:center;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;cursor:pointer;${active ? "background:#FF4E00;color:#FFFFFF" : "background:#F2F4F6;color:#191F28"}">${t}</span>`;
              })
              .join("")}</div>`
          : `<div style="padding:40px 0;text-align:center;font-size:14px;color:#8B95A1">이 날은 가능한 시간이 없어요</div>`;

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backSlotPicker" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">다른 시간 선택</span>
    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:16px">
      <span style="font-size:14px;color:#4E5968;line-height:1.5">트레이너가 가능한 시간만 보여드려요.<br/>선택하시면 트레이너 확인 후 확정돼요.</span>
      <div class="no-scrollbar" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px">${dateChips}</div>
      ${slotsHtml}
    </div>
    <div style="padding:12px 20px 32px">
      <div data-action="submitSlotRequest" style="background:${state.slotPickTime ? "#FF4E00" : "#E5E8EB"};border-radius:14px;padding:18px 0;text-align:center;${state.slotPickTime ? "box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer" : ""}"><span style="color:#fff;font-size:16px;font-weight:600">이 시간으로 요청</span></div>
    </div>
  </div>`;
      }

      // 요청함 시트: 확정 대기 중인 회원 요청을 한 번에 처리
      // 알림 풀페이지 (토스 알림 스타일)
      // [필터 칩] + 플랫 리스트: [회색 컨테인드 아이콘] 타입 제목(굵게) / 본문(회색 단일 톤) / 우상단 상대시간
      // 항목엔 버튼 없음 — 요청 탭 → 수업 요청 시트, 미기록 탭 → 기록 화면
      function renderNotifications() {
        const reqs = pendingRequests().map((e) => ({ ...e, kind: "request" }));
        const recs = unrecordedSessions().map((e) => ({ ...e, kind: "record" }));
        const entries = [...reqs, ...recs];
        const ord = (e) => {
          const [m, d] = e.dateKey.split(".").map(Number);
          return m * 31 * 1440 + d * 1440 + schedToMin(e.s.time);
        };
        entries.sort((a, b) => ord(b) - ord(a)); // 최신(미래 요청 포함)이 위

        const visible =
          state.notifFilter === "all"
            ? entries
            : entries.filter((e) => e.kind === state.notifFilter);

        // 필터 칩: 선택=짙은 차콜, 비선택=옅은 회색 + 주황 개수
        const chip = (key, label, count) => {
          const active = state.notifFilter === key;
          return `<span data-action="setNotifFilter:${key}" style="flex-shrink:0;display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;${active ? "background:#333D4B;color:#FFFFFF" : "background:#F2F4F6;color:#4E5968"}">${label}${count ? `<span style="color:${active ? "#FFFFFF" : "#FF4E00"};font-variant-numeric:tabular-nums">${count}</span>` : ""}</span>`;
        };
        const chips = `
    <div class="no-scrollbar" style="display:flex;gap:8px;padding:8px 20px 16px;overflow-x:auto;flex-shrink:0">
      ${chip("all", "전체", 0)}
      ${chip("request", "수업 시간 확정", reqs.length)}
      ${chip("record", "수업 기록", recs.length)}
    </div>`;

        // 컨테인드(채움) 아이콘 + 옅은 회색 배경
        const icon = (kind) => `
      <span style="width:36px;height:36px;border-radius:12px;background:#F2F4F6;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${
          kind === "request"
            ? '<svg viewBox="0 0 24 24" style="width:18px;height:18px" fill="#FF4E00"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm1 10.6 3.2 1.8-.9 1.6-4.3-2.4V6h2v6.6Z"/></svg>'
            : '<svg viewBox="0 0 24 24" style="width:18px;height:18px" fill="#D98E00"><path d="M3 17.2V21h3.8L17.9 9.9l-3.8-3.8L3 17.2ZM20.7 7.1a1 1 0 0 0 0-1.4l-2.4-2.4a1 1 0 0 0-1.4 0l-1.8 1.8 3.8 3.8 1.8-1.8Z"/></svg>'
        }
      </span>`;

        // 상대시간: 미기록=수업일 기준 경과일, 요청=도착 시각 목업
        const ago = (dateKey, kind) => {
          if (kind === "request") return "1시간 전";
          const days = Math.round(
            (keyToDateObj(TODAY_DATE) - keyToDateObj(dateKey)) / 86400000,
          );
          return days <= 0 ? "오늘" : `${days}일 전`;
        };

        const rows = visible
          .map(({ dateKey, s, kind }, i) => {
            const isChange =
              kind === "request" && s.name === state.selectedMemberName;
            const title = kind === "request" ? "수업 시간 확정" : "수업 기록";
            const wd = getDayData(dateKey).weekday;
            const oldT = state.memberLessonTime;
            // 본문은 단일 톤(굵기·색 계층 없음)의 문장 하나
            const body =
              kind === "request"
                ? isChange
                  ? `${s.name}님이 ${oldT.dateKey} ${getDayData(oldT.dateKey).weekday} ${oldT.time} 수업을 ${dateKey} ${wd} ${s.time}로 변경 요청했어요.`
                  : `${s.name}님이 ${dateKey} ${wd} ${s.time} 수업을 요청했어요.`
                : `${s.name}님의 ${dateKey} ${wd} ${s.time} ${s.tags.join("·")} 수업을 기록해주세요.`;
            const action =
              kind === "request"
                ? `openLessonRequest:${dateKey}:${s.name}`
                : `openRecordNew:${dateKey}:${s.name}`;
            return `
    ${i ? '<div style="height:1px;background:#F8F9FA"></div>' : ""}
    <div data-action="${action}" style="display:flex;align-items:flex-start;gap:12px;padding:18px 0;cursor:pointer">
      ${icon(kind)}
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span style="font-size:16px;font-weight:600;color:#191F28">${title}</span>
          <span style="font-size:12px;color:#8B95A1;flex-shrink:0">${ago(dateKey, kind)}</span>
        </div>
        <span style="font-size:14px;color:#4E5968;line-height:1.5;font-variant-numeric:tabular-nums">${body}</span>
      </div>
    </div>`;
          })
          .join("");

        const list = visible.length
          ? rows
          : `<div style="padding:80px 0;text-align:center;font-size:14px;color:#8B95A1">확인할 알림이 없어요</div>`;

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backNotifications" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">알림</span>
    </div>
    ${chips}
    <div id="scroll-container" class="no-scrollbar" style="flex:1;overflow:auto;padding:0 20px 40px;display:flex;flex-direction:column">
      ${list}
    </div>
  </div>`;
      }

      // 회원 수업 요청 확인 시트: 트레이너가 확정하거나 다른 시간을 제안
      function renderSheetLessonRequest() {
        const ref = state.lessonRequestRef || {};
        const s =
          (scheduleData[ref.dateKey] &&
            scheduleData[ref.dateKey].sessions.find(
              (x) => x.name === ref.name && x.status === "requested",
            )) ||
          {};
        const newLabel = `${ref.dateKey} ${getDayData(ref.dateKey || TODAY_DATE).weekday} · ${s.time || ""}`;
        // 김민지처럼 기존 확정 수업이 있는 회원이면 변경 전 시간도 함께 표시
        const isChange = ref.name === state.selectedMemberName;
        const oldLabel = isChange
          ? `${state.memberLessonTime.dateKey} ${getDayData(state.memberLessonTime.dateKey).weekday} · ${state.memberLessonTime.time}`
          : "";
        return sheetChrome(
          "수업 요청",
          `
    <div style="display:flex;align-items:center;gap:12px">
      <span class="squircle" style="width:44px;height:44px;background:#FFE9E0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#E63E00;flex-shrink:0">${(ref.name || "")[0] || ""}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <span style="font-size:16px;font-weight:600;color:#191F28">${ref.name || ""}</span>
        <span style="font-size:12px;color:#8B95A1">${recentGym}</span>
      </div>
    </div>
    <div style="background:#F7F8F9;border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:6px">
      ${isChange ? `<span style="font-size:14px;color:#B0B8C1;text-decoration:line-through;font-variant-numeric:tabular-nums">${oldLabel}</span>` : ""}
      <span style="font-size:18px;font-weight:600;color:#191F28;font-variant-numeric:tabular-nums">${newLabel}</span>
      <span style="font-size:12px;color:#8B95A1">${isChange ? "회원이 변경을 요청했어요" : "회원이 수업을 요청했어요"}</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:2px">
      <span data-action="declineLessonRequest" style="flex:1;background:#F2F4F6;border-radius:14px;padding:18px 0;text-align:center;font-size:16px;font-weight:600;color:#4E5968;cursor:pointer">다른 시간 제안</span>
      <span data-action="confirmLessonRequest" style="flex:1;background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;font-size:16px;font-weight:600;color:#FFFFFF;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer">확정</span>
    </div>
  `,
        );
      }

      // 회원 페이지 공유 시트: 링크 복사/카카오톡 전송 + 회원 화면 미리보기
      function renderSheetShare() {
        return sheetChrome(
          "회원 페이지 공유",
          `
    <span style="font-size:14px;color:#4E5968;line-height:1.5">${state.selectedMemberName} 회원님이 앱 설치 없이 본인의 운동 기록을 볼 수 있는 링크예요. 접속하려면 본인 전화번호 뒷자리 인증이 필요해요.</span>
    <div style="background:#F2F4F6;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px">
      <span style="flex:1;font-size:14px;font-weight:600;color:#4E5968;font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">pt.app/m/k3x9f2ab</span>
      <span data-action="closeSheet" style="font-size:14px;font-weight:600;color:#3182F6;flex-shrink:0;cursor:pointer">복사</span>
    </div>
    <div data-action="closeSheet" style="background:#FEE500;border-radius:14px;padding:16px 0;text-align:center;cursor:pointer"><span style="color:#191F28;font-size:16px;font-weight:600">카카오톡으로 보내기</span></div>
    <div data-action="openShareGate" style="background:#F2F4F6;border-radius:14px;padding:16px 0;text-align:center;cursor:pointer"><span style="color:#333D4B;font-size:16px;font-weight:600">회원 화면 미리보기</span></div>
    <span style="font-size:12px;color:#B0B8C1;text-align:center">링크를 다시 만들면 이전 링크는 사용할 수 없어요</span>
  `,
        );
      }

      // 회원 공유 페이지 잠금: 전화번호 뒷자리 본인 확인 (프로토타입 목업)
      function renderShareGate() {
        const digitBox = `<input type="tel" inputmode="numeric" maxlength="4" oninput="shareDigitInput(this)" onkeydown="shareDigitKey(this, event)" style="width:52px;height:60px;border:none;background:#F2F4F6;border-radius:14px;text-align:center;font-size:24px;font-weight:600;color:#191F28;outline:none;font-variant-numeric:tabular-nums" />`;
        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    <div style="padding:20px 20px 0;display:flex;justify-content:flex-end">
      <span data-action="exitShare" style="width:32px;height:32px;border-radius:999px;background:#F2F4F6;display:flex;align-items:center;justify-content:center;color:#4E5968;font-size:14px;cursor:pointer">✕</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 24px 80px;gap:32px">
      <div style="display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:600;color:#FF4E00">바디짐 강남점 · 박트레이너</span>
        <span style="font-size:24px;font-weight:600;color:#191F28;letter-spacing:-0.5px;line-height:1.35">${state.selectedMemberName}님의<br/>운동 기록</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <span style="font-size:16px;color:#4E5968;line-height:1.5">본인 확인을 위해<br/>전화번호 뒷자리 4자리를 입력해주세요</span>
        <div style="display:flex;gap:8px">${digitBox}${digitBox}${digitBox}${digitBox}</div>
      </div>
      <div data-action="unlockShare" style="background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer"><span style="color:#fff;font-size:16px;font-weight:600">확인</span></div>
    </div>
  </div>`;
      }

      // 눈바디/식단 추가·수정 — 전체 페이지 (kind: body | diet)
      function renderDiaryEntry() {
        const kind = state.diaryEntryKind;
        const isEdit = state.diaryEntryMode === "edit";
        const dateKey =
          state.diaryEntryDate || state.diarySelectedDate || TODAY_DATE;
        const dateLabel = `${dateKey} ${getDayData(dateKey).weekday}`;
        const title =
          (kind === "body" ? "눈바디" : "식단") + (isEdit ? " 수정" : " 추가");

        const photo = `<span style="width:72px;height:72px;border-radius:12px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:ui-monospace,monospace;color:#8B95A1;flex-shrink:0">img</span>`;
        const addPhoto = (size) =>
          `<span style="width:${size}px;height:${size}px;border-radius:12px;border:1.5px dashed #D1D6DB;display:flex;align-items:center;justify-content:center;font-size:22px;color:#B0B8C1;cursor:pointer;flex-shrink:0;box-sizing:border-box">+</span>`;

        let bodyHtml = "";
        if (kind === "body") {
          bodyHtml = `
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px">
        <span style="font-size:14px;font-weight:600;color:#191F28">사진</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${isEdit ? photo + photo : ""}${addPhoto(72)}</div>
      </div>`;
        } else {
          // 식단: 끼니별 섹션 — 사진은 1장, 메뉴는 여러 개 추가/삭제 가능
          const smallPhoto = photo
            .replace("72px;height:72px", "44px;height:44px")
            .replace("border-radius:12px", "border-radius:10px");
          const smallAdd = addPhoto(44).replace(
            "border-radius:12px",
            "border-radius:10px",
          );
          bodyHtml = ["아침", "점심", "저녁", "간식"]
            .map((meal) => {
              const menus = (state.dietMeals && state.dietMeals[meal]) || [];
              const menuRows = menus
                .map(
                  (m, i) => `
          <div style="display:flex;align-items:center;gap:8px">
            <input type="text" placeholder="메뉴를 입력해주세요" value="${m}" oninput="setDietMenuValue('${meal}',${i},this.value)" style="flex:1;min-width:0;border:none;background:#F2F4F6;border-radius:10px;padding:12px 14px;font-size:14px;color:#191F28;outline:none" />
            <span data-action="removeDietMenu:${meal}:${i}" style="width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#B0B8C1;font-size:14px;cursor:pointer;flex-shrink:0">✕</span>
          </div>`,
                )
                .join("");
              return `
      <div style="background:#FFFFFF;border-radius:14px;padding:16px 20px;display:flex;flex-direction:column;gap:10px">
        <span style="font-size:14px;font-weight:600;color:#191F28">${meal}</span>
        <div style="display:flex;align-items:flex-start;gap:10px">
          ${menus.length ? smallPhoto : smallAdd}
          <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px">
            ${menuRows}
            <div data-action="addDietMenu:${meal}" style="padding:${menus.length ? "6px" : "12px"} 0;cursor:pointer"><span style="font-size:14px;font-weight:600;color:#FF4E00">＋ 메뉴 추가</span></div>
          </div>
        </div>
      </div>`;
            })
            .join("");
        }

        // 하단: 수정 모드는 휴지통 + 저장 나란히, 신규는 저장만
        const deleteBtn = isEdit
          ? `<div data-action="deleteDiaryEntry" style="width:56px;border:1px solid #E5E8EB;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#FFFFFF">
              <svg viewBox="0 0 24 24" style="width:20px;height:20px" fill="none" stroke="#8B95A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </div>`
          : "";

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backDiaryEntry" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">${title} <span style="color:#4E5968;font-weight:500">· ${state.selectedMemberName}</span></span>
    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:10px">
      <div style="background:#FFFFFF;border-radius:14px;padding:16px 20px;display:flex;align-items:center">
        <span style="font-size:14px;font-weight:600;color:#191F28">날짜</span>
        <span style="margin-left:auto;font-size:14px;font-weight:600;color:#191F28;font-variant-numeric:tabular-nums">${dateLabel}</span>
      </div>
      ${bodyHtml}
    </div>
    <div style="padding:12px 20px 32px;display:flex;gap:8px">
      ${deleteBtn}
      <div data-action="saveDiaryEntry" style="flex:1;background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer"><span style="color:#fff;font-size:16px;font-weight:600">저장</span></div>
    </div>
  </div>`;
      }

      function sheetChrome(title, inner, fullHeight = false) {
        // fullHeight: 시트를 화면 최대 높이로 고정, 내용 영역만 스크롤
        const body = fullHeight
          ? `<div class="no-scrollbar" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:36px">${inner}</div>`
          : inner;
        return `
  <div style="position:absolute;left:0;right:0;${fullHeight ? "top:28px;" : ""}bottom:0;z-index:21;background:#FFFFFF;border-radius:20px 20px 0 0;padding:12px 24px ${fullHeight ? "0" : "36px"};box-shadow:0 -8px 32px rgba(25,31,40,.18);display:flex;flex-direction:column;gap:14px">
    <div style="width:36px;height:4px;border-radius:99px;background:#E5E8EB;margin:0 auto"></div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:18px;font-weight:600;color:#191F28">${title}</span>
      <span data-action="closeSheet" style="width:32px;height:32px;border-radius:999px;background:#F2F4F6;display:flex;align-items:center;justify-content:center;color:#4E5968;font-size:14px">✕</span>
    </div>
    ${body}
  </div>`;
      }

      // 일정 등록: 내용이 많아 바텀시트 대신 전체 페이지 (CTA 하단 고정)
      function renderScheduleForm() {
        const toggleHtml = `
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:#E5E8EB;border-radius:14px;padding:4px;margin-bottom:8px">
            <span data-action="setScheduleType:session" style="text-align:center;padding:10px 0;font-size:14px;border-radius:11px;cursor:pointer;${state.scheduleType === "session" ? "background:#FFFFFF;font-weight:600;color:#191F28" : "font-weight:500;color:#4E5968"}">수업</span>
            <span data-action="setScheduleType:consult" style="text-align:center;padding:10px 0;font-size:14px;border-radius:11px;cursor:pointer;${state.scheduleType === "consult" ? "background:#FFFFFF;font-weight:600;color:#191F28" : "font-weight:500;color:#4E5968"}">상담</span>
            <span data-action="setScheduleType:personal" style="text-align:center;padding:10px 0;font-size:14px;border-radius:11px;cursor:pointer;${state.scheduleType === "personal" ? "background:#FFFFFF;font-weight:600;color:#191F28" : "font-weight:500;color:#4E5968"}">기타</span>
          </div>
        `;

        // 공통 스타일: 좌측 행 라벨(크고 진하게) / 우측 컴팩트 필(작고 연한 배경)
        const rowLabel = "font-size:16px;font-weight:600;color:#191F28";
        const pill =
          "background:#F2F4F6;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:#191F28";
        const [mm, dd] = state.scheduleDate.split(".");
        const wd = getDayData(state.scheduleDate).weekday;
        const dateLabel = `${mm}월 ${dd}일${wd ? ` (${wd})` : ""}`;

        const chevIcon = `<svg viewBox="0 0 24 24" style="width:11px;height:11px;flex-shrink:0" fill="#8B95A1"><path d="M12 3.5l5 6.5H7l5-6.5z"/><path d="M12 20.5L7 14h10l-5 6.5z"/></svg>`;

        // 필 형태의 셀렉트 박스 (우측에 위/아래 수정 아이콘)
        // 일자(110px) + 시간(72px) + 간격(8px)을 합친 폭으로 우측 정렬
        function pillSelect(options, value, handler) {
          return `<div style="${pill};width:190px;box-sizing:border-box;display:flex;align-items:center;gap:6px">
                <select onchange="${handler}(this.value)" style="flex:1;border:none;appearance:none;-webkit-appearance:none;background:transparent;font-size:14px;font-weight:600;color:#191F28;outline:none;cursor:pointer;text-align:center">${options.map((o) => `<option value="${o}"${o === value ? " selected" : ""}>${o}</option>`).join("")}</select>
                ${chevIcon}
              </div>`;
        }

        // 시작/종료 시간 선택 (시작 변경 시 종료는 자동으로 +1시간)
        function timeSelect(value, handler) {
          let opts = "";
          for (let h = 6; h <= 23; h++) {
            for (const m of ["00", "30"]) {
              const t = `${String(h).padStart(2, "0")}:${m}`;
              opts += `<option value="${t}"${t === value ? " selected" : ""}>${t}</option>`;
            }
          }
          return `<select onchange="${handler}(this.value)" style="width:72px;box-sizing:border-box;border:none;appearance:none;-webkit-appearance:none;${pill};text-align:center;outline:none;cursor:pointer">${opts}</select>`;
        }
        const timeRowsHtml = `
            <div style="display:flex;flex-direction:column">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
                <span style="${rowLabel}">시작</span>
                <div style="display:flex;gap:8px">
                  <span style="${pill};width:110px;box-sizing:border-box;text-align:center">${dateLabel}</span>
                  ${timeSelect(state.scheduleStartTime, "onStartTimeChange")}
                </div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
                <span style="${rowLabel}">종료</span>
                <div style="display:flex;gap:8px">
                  <span style="${pill};width:110px;box-sizing:border-box;text-align:center">${dateLabel}</span>
                  ${timeSelect(state.scheduleEndTime, "onEndTimeChange")}
                </div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
                <span style="${rowLabel}">장소</span>
                ${pillSelect(gyms, state.scheduleGym, "onGymChange")}
              </div>
            </div>
        `;

        let formHtml = "";

        if (state.scheduleType === "consult") {
          formHtml = `
            <input type="text" placeholder="상담자 이(비회원)" value="${state.consultantName || ""}" oninput="state.consultantName = this.value" style="width:100%;border:none;background:transparent;padding:6px 0 14px;font-size:24px;font-weight:600;color:#191F28;outline:none" />
            ${timeRowsHtml}
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
              <span style="${rowLabel}">상담 메모</span>
              <textarea placeholder="방문 목적, 신체 상태 등 상담 세부 내용을 기록하세요" oninput="state.consultMemo = this.value" style="width:100%;height:80px;border:none;background:#F2F4F6;border-radius:12px;padding:12px 14px;font-size:14px;color:#191F28;outline:none;resize:none">${state.consultMemo || ""}</textarea>
            </div>
          `;
        } else if (state.scheduleType === "personal") {
          formHtml = `
            <input type="text" placeholder="제목" value="${state.personalTitle || ""}" oninput="state.personalTitle = this.value" style="width:100%;border:none;background:transparent;padding:6px 0 14px;font-size:24px;font-weight:600;color:#191F28;outline:none" />
            ${timeRowsHtml}
          `;
        } else {
          const parts = ["등", "가슴어깨", "하체", "복근", "기타"];
          const partChipsHtml = parts
            .map((p) => {
              const on = state.scheduleParts.includes(p);
              const activeBg = "#FFE9E0";
              const activeColor = "#E63E00";
              return `<span data-action="toggleSchedulePart:${p}" style="font-size:14px;font-weight:${on ? 600 : 500};padding:8px 14px;border-radius:999px;cursor:pointer;background:${on ? activeBg : "#F2F4F6"};color:${on ? activeColor : "#4E5968"}">${p}</span>`;
            })
            .join("");

          const isOtherSelected = state.scheduleParts.includes("기타");
          const otherInputHtml = isOtherSelected
            ? `
              <input type="text" placeholder="기타 일정 상세를 입력해 주세요" value="${state.otherSchedulePart || ""}" oninput="state.otherSchedulePart = this.value" style="width:100%;border:none;background:#F2F4F6;border-radius:10px;padding:10px 14px;font-size:14px;color:#191F28;outline:none;margin-top:8px" />`
            : "";

          // 회원 가능 시간 안내 + 선택 시간이 벗어나면 경고
          const avail = memberAvail[state.scheduleMember];
          let availHtml = "";
          if (avail) {
            const wd = getDayData(state.scheduleDate).weekday;
            const range = avail.ranges[wd];
            const startH = parseInt(state.scheduleStartTime, 10);
            const outside = !range || startH < range[0] || startH >= range[1];
            availHtml = `
            <div style="display:flex;flex-direction:column;gap:2px;padding:0 0 6px">
              <span style="font-size:12px;color:#8B95A1">${state.scheduleMember}님 가능 시간 · ${avail.label}</span>
              ${outside ? '<span style="font-size:12px;font-weight:600;color:#F04452">가능 시간을 벗어난 일정이에요</span>' : ""}
            </div>`;
          }

          // 반복: 없음/매주/격주 + 요일 다중 선택, 잔여 회차만큼 생성
          const repeatSeg = (label, v) =>
            `<span data-action="setScheduleRepeat:${v}" style="flex:1;text-align:center;padding:8px 0;font-size:14px;border-radius:9px;cursor:pointer;${state.scheduleRepeat === v ? "background:#FFFFFF;font-weight:600;color:#191F28" : "font-weight:500;color:#4E5968"}">${label}</span>`;
          const repeatDaysHtml =
            state.scheduleRepeat !== "none"
              ? `
            <div style="display:flex;flex-direction:column;gap:8px;padding:6px 0 2px">
              <div style="display:flex;gap:6px">${WEEKDAY_NAMES.map((d) => {
                const on = state.scheduleRepeatDays.includes(d);
                return `<span data-action="toggleRepeatDay:${d}" style="flex:1;text-align:center;padding:8px 0;border-radius:10px;font-size:14px;font-weight:${on ? 600 : 500};cursor:pointer;background:${on ? "#FFE9E0" : "#F2F4F6"};color:${on ? "#E63E00" : "#4E5968"}">${d}</span>`;
              }).join("")}</div>
              <span style="font-size:12px;color:#8B95A1">잔여 ${(allMembers.find((m) => m.name === state.scheduleMember) || {}).left || 0}회만큼 생성돼요</span>
            </div>`
              : "";

          formHtml = `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
              <span style="${rowLabel}">회원</span>
              ${pillSelect(
                allMembers.filter((m) => !m.isUnregistered).map((m) => m.name),
                state.scheduleMember,
                "onMemberChange",
              )}
            </div>
            ${availHtml}
            ${timeRowsHtml}
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
              <span style="${rowLabel}">반복</span>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:#F2F4F6;border-radius:11px;padding:3px;width:190px;box-sizing:border-box">
                ${repeatSeg("없음", "none")}${repeatSeg("매주", "weekly")}${repeatSeg("격주", "biweekly")}
              </div>
            </div>
            ${repeatDaysHtml}
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
              <span style="${rowLabel}">수업 부위</span>
              <div style="display:flex;gap:6px;flex-wrap:wrap">${partChipsHtml}</div>
              ${otherInputHtml}
            </div>
          `;
        }

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backScheduleForm" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">일정 등록</span>
    </div>
    <div id="scroll-container" class="no-scrollbar" style="flex:1;overflow:auto;padding:4px 24px 20px;display:flex;flex-direction:column;gap:14px">
      ${toggleHtml}
      ${formHtml}
    </div>
    <div style="padding:12px 20px 32px">
      <div data-action="confirmSchedule" style="background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer"><span style="color:#fff;font-size:16px;font-weight:600">등록</span></div>
    </div>
  </div>`;
      }

      function renderSheetMember() {
        return sheetChrome(
          "신규 회원 등록",
          `
    <div style="display:flex;gap:8px">
      <div style="flex:1.4;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:12px;font-weight:600;color:#8B95A1">이름</span>
        <div style="background:#F2F4F6;border-radius:14px;padding:14px 18px;font-size:16px;color:#8B95A1">예: 박지훈</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:12px;font-weight:600;color:#8B95A1">성별</span>
        <div style="display:flex;gap:6px">
          <span style="flex:1;background:#FFE9E0;color:#E63E00;font-size:14px;font-weight:600;padding:14px 0;border-radius:14px;text-align:center">남</span>
          <span style="flex:1;background:#F2F4F6;color:#4E5968;font-size:14px;font-weight:500;padding:14px 0;border-radius:14px;text-align:center">여</span>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <span style="font-size:12px;font-weight:600;color:#8B95A1">연락처</span>
      <div style="background:#F2F4F6;border-radius:14px;padding:14px 18px;font-size:16px;color:#8B95A1;font-variant-numeric:tabular-nums">010-0000-0000</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <span style="font-size:12px;font-weight:600;color:#8B95A1">이용권 횟수</span>

        else if (state.screen === "memberDetail")

        else if (state.screen === "exerciseGraph")
          screenHtml = renderExerciseGraph();
        else if (state.screen === "profile") screenHtml = renderProfile();
        else if (state.screen === "myRoutines") screenHtml = renderMyRoutines();

        const showBackdrop = state.sheet && state.sheet !== "exercisePicker";
        const overlay = showBackdrop
          ? `<div data-action="closeSheet" style="position:absolute;inset:0;z-index:20;background:rgba(25,31,40,.40)"></div>`

        let sheetHtml = "";
        if (state.sheet === "member") sheetHtml = renderSheetMember();
        else if (state.sheet === "routine") sheetHtml = renderSheetRoutine();
        else if (state.sheet === "edit") sheetHtml = renderSheetEdit();
        else if (state.sheet === "loadRoutine")

        const modalHtml =

        // 통합 FAB 및 당근마켓 스타일 스피드 다이얼 오버레이 (이모지/아이콘 절대 금지)

        const noTabbarScreens = [

          "shareGate",
          "slotPicker",
          "gymSettings",

              const dateKey = state.scheduleDate;
              let firstMin = null;
              if (state.scheduleView === "day") {

                weekKeysOf(dateKey).map(getDayData).forEach((d) => {
                  d.sessions.forEach((s) => {
                    const m = schedToMin(s.time);
                    if (firstMin === null || m < firstMin) firstMin = m;
                  });
                });
              }
              // 첫 일정 위 1시간 여유를 두고 스크롤, 일정 없으면 8시로
              const targetHour = firstMin !== null ? Math.max(0, firstMin / 60 - 1.5) : 8;
              const targetScrollTop = Math.max(0, grid.offsetTop + targetHour * SCHED_HOUR_PX - 24);
              setTimeout(() => {
                const sc = document.getElementById("scroll-container");
                if (sc) sc.scrollTo({ top: targetScrollTop, behavior: "smooth" });
              }, 400);
            }
          } else {
          // 일정 화면 진입 시 현재 시간 표시선이 화면 중앙에 오도록 스크롤
          const nowLine =
            scrollKey !== lastScrollKey && state.screen === "schedule"
              ? document.getElementById("now-line")
              : null;
          if (nowLine) {
            // offsetTop은 time-grid 기준이므로, 스크롤 컨테이너 기준 좌표로 환산
            const lineTop =
              nowLine.getBoundingClientRect().top -
              newContainer.getBoundingClientRect().top +
              newContainer.scrollTop;
            newContainer.scrollTop = Math.max(
              0,
              lineTop - newContainer.clientHeight / 2,
            );
          } else if (
            scrollKey !== lastScrollKey &&
            state.screen === "schedule"
          ) {
            // 일정 화면 첫 진입(오늘 아님): 빈 새벽 대신 아침 시간대부터 보이게
            const grid = document.getElementById("time-grid");
            newContainer.scrollTop = grid ? grid.offsetTop + 6 * 64 - 24 : 0;
          } else {
            newContainer.scrollTop =
              scrollKey === lastScrollKey ? scrollTop : 0;
          }
          }
          updateScrollTopBtn(newContainer);
        }
        lastScheduleView = state.scheduleView;
        lastScrollKey = scrollKey;

        document.querySelectorAll("[data-hscroll]").forEach((el) => {
          const v = hscrolls[el.getAttribute("data-hscroll")];
          if (v != null) el.scrollLeft = v;
        });
      }

      /* ---------------- 위로 돌아가기 ---------------- */
      let scrollTopTarget = null;

      function updateScrollTopBtn(el) {
        const btn = document.getElementById("scroll-top-btn");
        if (!btn || !el) return;
        // 한 페이지 반 이상 스크롤됐을 때만 표시
        const show = el.scrollTop > el.clientHeight * 1.5;
        if (show) scrollTopTarget = el;
        btn.style.display = show ? "flex" : "none";
      }

      // scroll 이벤트는 버블링되지 않으므로 캡처 단계에서 감지
      document.getElementById("app").addEventListener(
        "scroll",
        (e) => {
          if (e.target && typeof e.target.scrollTop === "number")
            updateScrollTopBtn(e.target);
        },
        true,
      );

      document.getElementById("app").addEventListener("click", (e) => {
        const el = e.target.closest("[data-action]");
        if (!el) return;
        // 스와이프 직후의 클릭은 무시 (드래그 끝에 세션이 열리는 오작동 방지)
        if (swipeJustEnded) return;
        dispatch(el.getAttribute("data-action"));
      });

      /* ---------------- 일정 좌우 스와이프 (이전/다음 일·주·월) ---------------- */
      // 손가락을 따라 [이전][현재][다음] 3패널 스트립이 밀리고,
      // 시간축(라벨·가로선)은 스트립 밖에 있어 고정 유지.
      // 이웃 패널은 날짜 골격만 보이고, 상세 일정은 전환 완료(재렌더) 시 한번에 등장.
      let swipeState = null;
      let swipeJustEnded = false;
      const SWIPE_D = 240; // 스냅 애니메이션(ms)

      function swipeStrips() {
        return Array.from(document.querySelectorAll("[data-swipe-strip]"));
      }
      function setStrips(transform, animate) {
        swipeStrips().forEach((s) => {
          s.style.transition = animate ? `transform ${SWIPE_D}ms ease` : "none";
          s.style.transform = transform;
        });
      }

      /* ---------------- 주간 격자(가능시간/영업시간) 드래그 선택 ---------------- */
      // 탭 = 셀 1개 토글, 드래그 = 첫 점과 현재 점을 대각선으로 하는
      // 직사각형 영역 일괄 선택(시작 셀이 꺼져 있으면)/해제(켜져 있으면).
      // 드래그 중에는 DOM만 칠해서 프리뷰하고, 손을 떼면 상태에 커밋한다.
      let hourDrag = null;
      const hourDragArr = (key) =>
        key === "avail" ? state.availCells : state.gymFormCells;

      function hourDragPreview(curId) {
        const [d0, h0] = hourDrag.start.split("-");
        const [d1, h1] = curId.split("-");
        const dLo = Math.min(WEEKDAY_NAMES.indexOf(d0), WEEKDAY_NAMES.indexOf(d1));
        const dHi = Math.max(WEEKDAY_NAMES.indexOf(d0), WEEKDAY_NAMES.indexOf(d1));
        const hLo = Math.min(Number(h0), Number(h1));
        const hHi = Math.max(Number(h0), Number(h1));
        const rect = [];
        for (let d = dLo; d <= dHi; d++)
          for (let h = hLo; h <= hHi; h++) rect.push(`${WEEKDAY_NAMES[d]}-${h}`);
        hourDrag.result = hourDrag.adding
          ? [...new Set([...hourDrag.base, ...rect])]
          : hourDrag.base.filter((c) => !rect.includes(c));
        hourDrag.gridEl.querySelectorAll("[data-grid-cell]").forEach((el) => {
          el.style.background = hourDrag.result.includes(
            el.getAttribute("data-grid-cell"),
          )
            ? "#02B262"
            : "#F2F4F6";
        });
      }

      const appEl = document.getElementById("app");
      appEl.addEventListener("pointerdown", (e) => {
        const gridCell = e.target.closest("[data-grid-cell]");
        if (gridCell) {
          const gridEl = gridCell.closest("[data-hour-grid]");
          if (gridEl) {
            const key = gridEl.getAttribute("data-hour-grid");
            const id = gridCell.getAttribute("data-grid-cell");
            hourDrag = {
              key,
              gridEl,
              start: id,
              base: [...hourDragArr(key)],
              adding: !hourDragArr(key).includes(id),
            };
            hourDragPreview(id);
            return;
          }
        }
        if (
          state.screen !== "schedule" ||
          state.sheet ||
          state.scheduleViewMenu ||
          state.showSpeedDial
        )
          return;
        const sc = document.getElementById("scroll-container");
        if (!sc || !sc.contains(e.target) || !swipeStrips().length) return;
        swipeState = {
          x: e.clientX,
          y: e.clientY,
          w: sc.clientWidth,
          dx: 0,
          active: false,
        };
      });

      appEl.addEventListener("pointermove", (e) => {
        if (hourDrag) {
          const el = document.elementFromPoint(e.clientX, e.clientY);
          const cell = el && el.closest && el.closest("[data-grid-cell]");
          if (cell && hourDrag.gridEl.contains(cell))
            hourDragPreview(cell.getAttribute("data-grid-cell"));
          return;
        }
        if (!swipeState) return;
        const dx = e.clientX - swipeState.x;
        const dy = e.clientY - swipeState.y;
        if (!swipeState.active) {
          // 수평 의도가 분명할 때만 스와이프 시작 (세로 스크롤과 충돌 방지)
          if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.2) {
            swipeState.active = true;
            document.body.style.userSelect = "none";
          } else if (Math.abs(dy) > 12) {
            swipeState = null;
            return;
          } else return;
        }
        swipeState.dx = dx;
        setStrips(`translateX(calc(-33.3333% + ${dx}px))`, false);
      });

      function finishSwipe() {
        if (!swipeState) return;
        const { dx, w, active } = swipeState;
        swipeState = null;
        document.body.style.userSelect = "";
        if (!active) return;
        swipeJustEnded = true;
        setTimeout(() => (swipeJustEnded = false), 100);

        const commit = Math.abs(dx) > w * 0.28;
        if (!commit) {
          setStrips("translateX(-33.3333%)", true);
          return;
        }
        const dir = dx < 0 ? 1 : -1; // 왼쪽으로 밀면 다음(+1)
        setStrips(`translateX(${dir === 1 ? "-66.6666%" : "0%"})`, true);
        setTimeout(() => {
          if (state.scheduleView === "day")
            state.scheduleDate = shiftKey(state.scheduleDate, dir);
          else if (state.scheduleView === "week")
            state.scheduleDate = shiftKey(state.scheduleDate, dir * 7);
          else {
            dir === 1 ? actions.nextMonth() : actions.prevMonth();
            return; // set()이 render까지 수행
          }
          render();
        }, SWIPE_D + 20);
      }
      appEl.addEventListener("pointerup", finishSwipe);
      appEl.addEventListener("pointercancel", () => {
        if (swipeState && swipeState.active)
          setStrips("translateX(-33.3333%)", true);
        swipeState = null;
        document.body.style.userSelect = "";
      });

      // 주간 격자 드래그 종료: 프리뷰 결과를 상태에 커밋 (앱 밖에서 떼도 동작)
      ["pointerup", "pointercancel"].forEach((t) =>
        window.addEventListener(t, () => {
          if (!hourDrag) return;
          const arr = hourDragArr(hourDrag.key);
          arr.length = 0;
          arr.push(...hourDrag.result);
          hourDrag = null;
          render();
        }),
      );

      render();
    </script>
  </body>
</html>
