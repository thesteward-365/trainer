      function renderMonthlyCalendarSheet() {
        const days = [];
        const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
        const weekdaysHtml = weekdays
          .map(
            (w) =>
              `<span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center;padding:8px 0">${w}</span>`,
          )
          .join("");

        const year = state.calendarYear || 2026;
        const month = state.calendarMonth || 7;
        const firstDay = new Date(year, month - 1, 1).getDay();
        const lastDate = new Date(year, month, 0).getDate();

        // 1일 이전의 빈칸
        for (let i = 0; i < firstDay; i++) {
          days.push(`<span></span>`);
        }

        // 1일부터 말일까지
        for (let d = 1; d <= lastDate; d++) {
          const dateKey = `${month}.${d}`;
          const sessions =
            (scheduleData[dateKey] && scheduleData[dateKey].sessions) || [];
          const hasSession = sessions.some((s) => !s.tags.includes("상담"));
          const hasConsult = sessions.some((s) => s.tags.includes("상담"));
          const isSelected = state.scheduleDate === dateKey;

          let borderStyle = "1.5px solid transparent";
          let dateBg = "transparent";
          let dateColor = "#191F28";
          let dateWeight = "500";

          if (isSelected) {
            borderStyle = "1.5px solid #FF4E00";
            dateWeight = "700";
          }

          let dotHtml = "";
          if (hasSession && hasConsult) {
            dotHtml = `
              <div style="display:flex;gap:3px;justify-content:center;margin-top:2px">
                <span style="width:4px;height:4px;border-radius:99px;background:#FF4E00"></span>
                <span style="width:4px;height:4px;border-radius:99px;background:#1B64DA"></span>
              </div>
            `;
          } else if (hasSession) {
            dotHtml = `<div style="display:flex;justify-content:center;margin-top:2px"><span style="width:4px;height:4px;border-radius:99px;background:#FF4E00"></span></div>`;
          } else if (hasConsult) {
            dotHtml = `<div style="display:flex;justify-content:center;margin-top:2px"><span style="width:4px;height:4px;border-radius:99px;background:#1B64DA"></span></div>`;
          } else {
            dotHtml = `<div style="height:6px"></div>`;
          }

          days.push(`
            <div data-action="selectScheduleDateAndClose:${dateKey}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;border-radius:12px;border:${borderStyle};background:${dateBg};cursor:pointer;min-height:50px">
              <span style="font-size:15px;font-weight:${dateWeight};color:${dateColor};font-variant-numeric:tabular-nums">${d}</span>
              ${dotHtml}
            </div>
          `);
        }

        const daysHtml = days.join("");

        return sheetChrome(
          "달력",
          `
          <div style="display:flex;flex-direction:column;gap:12px;min-height:435px">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:0 8px;margin-bottom:8px">
              <span data-action="prevMonth" style="font-size:18px;font-weight:700;color:#8B95A1;cursor:pointer;padding:4px 12px">‹</span>
              <span style="font-size:16px;font-weight:800;color:#191F28">${year}년 ${month}월</span>
              <span data-action="nextMonth" style="font-size:18px;font-weight:700;color:#8B95A1;cursor:pointer;padding:4px 12px">›</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
              ${weekdaysHtml}
            </div>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
              ${daysHtml}
            </div>
          </div>
          `,
        );
      }

    <div class="no-scrollbar" style="flex:1;overflow-y:auto;padding:0 20px 12px;display:flex;flex-direction:column;gap:2px">
      ${rowsHtml}
    </div>
    <div style="flex-shrink:0;padding:12px 20px 32px">
      <div data-action="confirmAddExercises" style="background:${count > 0 ? "#FF4E00" : "#E5E8EB"};border-radius:14px;padding:17px 0;text-align:center;box-shadow:${count > 0 ? "0 6px 16px rgba(255,78,0,.3)" : "none"}"><span style="color:${count > 0 ? "#FFFFFF" : "#8B95A1"};font-size:15px;font-weight:700">${isReplace ? (count > 0 ? `${picker.selected[0]}(으)로 바꾸기` : "바꿀 운동 선택") : `추가 완료${count > 0 ? ` (${count})` : ""}`}</span></div>
    </div>
  </div>`;
      }

      /* ---------------- 메인 렌더 ---------------- */
      function render() {
        const container = document.getElementById("scroll-container");
        const scrollTop = container ? container.scrollTop : 0;

        let screenHtml;
        if (state.screen === "schedule") screenHtml = renderSchedule();
        else if (state.screen === "record") screenHtml = renderRecord();
        else if (state.screen === "consultDetail")
          screenHtml = renderConsultDetail();
        else if (state.screen === "members") screenHtml = renderMembers();
        else if (state.screen === "memberDetail")
          screenHtml = renderMemberDetail();
        else if (state.screen === "exerciseGraph")
          screenHtml = renderExerciseGraph();
        else if (state.screen === "profile") screenHtml = renderProfile();
        else if (state.screen === "myRoutines") screenHtml = renderMyRoutines();

        const showBackdrop = state.sheet && state.sheet !== "exercisePicker";
        const overlay = showBackdrop
          ? `<div data-action="closeSheet" style="position:absolute;inset:0;z-index:20;background:rgba(25,31,40,.40)"></div>`
          : "";
        let sheetHtml = "";
        if (state.sheet === "schedule") sheetHtml = renderSheetSchedule();
        else if (state.sheet === "member") sheetHtml = renderSheetMember();
        else if (state.sheet === "routine") sheetHtml = renderSheetRoutine();
        else if (state.sheet === "edit") sheetHtml = renderSheetEdit();
        else if (state.sheet === "loadRoutine")
          sheetHtml = renderSheetLoadRoutine();
        else if (state.sheet === "monthlyCalendar")
          sheetHtml = renderMonthlyCalendarSheet();

        const modalHtml =
          state.sheet === "exercisePicker" ? renderExercisePickerModal() : "";

        // 통합 FAB 및 당근마켓 스타일 스피드 다이얼 오버레이 (이모지/아이콘 절대 금지)
        let speedDialHtml = "";
        if (state.showSpeedDial) {
          speedDialHtml = `
            <div data-action="closeSpeedDial" style="position:absolute;inset:0;z-index:22;background:rgba(0,0,0,0.4)"></div>
            <div class="speed-dial-menu" style="position:absolute;right:20px;bottom:160px;z-index:23;display:flex;flex-direction:column;gap:10px;width:180px;">
              <div style="background:#FFFFFF;border-radius:16px;box-shadow:0 8px 24px rgba(25,31,40,0.12);overflow:hidden;display:flex;flex-direction:column">
                <div data-action="actionSchedule" style="font-size:15px;font-weight:700;color:#191F28;padding:16px 20px;cursor:pointer;border-bottom:1px solid #EFF2F5;text-align:center">일정 등록</div>
                <div data-action="actionMember" style="font-size:15px;font-weight:700;color:#191F28;padding:16px 20px;cursor:pointer;text-align:center">회원 등록</div>
              </div>
            </div>
          `;
        }

        let fabHtml = "";
        if (state.screen === "schedule" || state.screen === "members") {
          const isOpened = state.showSpeedDial;
          fabHtml = `
            <div data-action="toggleSpeedDial" style="position:absolute;right:20px;bottom:96px;z-index:${isOpened ? 25 : 19};width:56px;height:56px;border-radius:999px;background:${isOpened ? "#FFFFFF" : "#FF4E00"};display:flex;align-items:center;justify-content:center;box-shadow:${isOpened ? "0 6px 20px rgba(0,0,0,0.28)" : "0 6px 16px rgba(255,78,0,0.36)"};cursor:pointer;transition:transform 0.2s, background-color 0.2s">
              <span style="color:${isOpened ? "#FF4E00" : "#FFFFFF"};font-size:26px;font-weight:500;transform:rotate(${isOpened ? "45deg" : "0deg"});transition:transform 0.2s, color 0.2s;line-height:1">+</span>
            </div>
          `;
        }

        // 위로 돌아가기 버튼: 플로팅 요소(FAB/플로팅 탭바/탭바) 위에 위치
        const noTabbarScreens = [
          "record",
          "consultDetail",
          "exerciseGraph",
          "myRoutines",
        ];
        let scrollTopBtnBottom;
        if (state.screen === "schedule" || state.screen === "members")
          scrollTopBtnBottom = 164; // FAB(bottom 96 + 56) 위
        else if (state.screen === "memberDetail")
          scrollTopBtnBottom = 100; // 플로팅 탭바(bottom 24 + 64) 위
        else if (noTabbarScreens.includes(state.screen))
          scrollTopBtnBottom = 24;
        else scrollTopBtnBottom = 88; // 하단 탭바(68) 위
        const scrollTopBtnHtml = `
          <div id="scroll-top-btn" data-action="scrollToTop" style="display:none;position:absolute;right:20px;bottom:${scrollTopBtnBottom}px;z-index:19;width:44px;height:44px;border-radius:999px;background:#FFFFFF;border:1px solid rgba(0,0,0,0.04);box-shadow:0 6px 20px rgba(0,0,0,0.14);align-items:center;justify-content:center;cursor:pointer">
            <svg viewBox="0 0 24 24" style="width:20px;height:20px" fill="none" stroke="#4E5968" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"></polyline></svg>
          </div>
        `;

        document.getElementById("app").innerHTML = `
          ${screenHtml}
          ${renderTabbar()}
          ${scrollTopBtnHtml}
          ${overlay}
          ${sheetHtml}
          ${modalHtml}
          ${speedDialHtml}
          ${fabHtml}
        `;

        const newContainer = document.getElementById("scroll-container");
        if (newContainer) {
          newContainer.scrollTop = scrollTop;
          updateScrollTopBtn(newContainer);
        }
      }

      /* ---------------- 위로 돌아가기 ---------------- */
      let scrollTopTarget = null;

      function updateScrollTopBtn(el) {
        const btn = document.getElementById("scroll-top-btn");
        if (!btn || !el) return;
        // 한 페이지 반 이상 스크롤됐을 때만 표시
        const show = el.scrollTop > el.clientHeight * 1.5;
        if (show) scrollTopTarget = el;
        btn.style.display = show ? "flex" : "none";
      }

      // scroll 이벤트는 버블링되지 않으므로 캡처 단계에서 감지
      document.getElementById("app").addEventListener(
        "scroll",
        (e) => {
          if (e.target && typeof e.target.scrollTop === "number")
            updateScrollTopBtn(e.target);
        },
        true,
      );

      document.getElementById("app").addEventListener("click", (e) => {
        const el = e.target.closest("[data-action]");
        if (!el) return;
        dispatch(el.getAttribute("data-action"));
      });

      render();
    </script>
  </body>
</html>
