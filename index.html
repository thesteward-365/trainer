      function shareDigitInput(el) {
        const digits = el.value.replace(/\D/g, "");
        el.value = digits.slice(0, 1);
        // 여러 자리 붙여넣기: 뒤 칸에 순서대로 분배
        let next = el.nextElementSibling;
        for (let i = 1; i < digits.length && next; i++) {
          next.value = digits[i];
          next = next.nextElementSibling;
        }
        if (el.value) {
          const target =
            digits.length > 1
              ? next || el.parentElement.lastElementChild
              : el.nextElementSibling;
          if (target) target.focus();
        }
      }
      function shareDigitKey(el, e) {
        // 빈 칸에서 백스페이스 → 이전 칸으로 이동 후 지움
        if (e.key === "Backspace" && !el.value && el.previousElementSibling) {
          el.previousElementSibling.value = "";
          el.previousElementSibling.focus();
          e.preventDefault();
        }
      }

          if (!scheduleData[date]) {

          }

          if (state.scheduleType === "consult") {
            const cName = state.consultantName || "비회원";
            scheduleData[date].sessions.push({

              endTime: state.scheduleEndTime,

            });

            const exist = allMembers.find((m) => m.name === cName);

                isUnregistered: true,

          } else if (state.scheduleType === "personal") {
            scheduleData[date].sessions.push({

              name: state.personalTitle || "기타 일정",
              tags: ["기타"],
              type: "etc",
              place: state.scheduleGym,
            });
          } else {
            const tags = [...state.scheduleParts];
            const etcIdx = tags.indexOf("기타");
            if (etcIdx !== -1 && state.otherSchedulePart) {
              tags[etcIdx] = `기타: ${state.otherSchedulePart}`;
            }
            const baseSession = {
              time: state.scheduleStartTime,
              endTime: state.scheduleEndTime,
              name: state.scheduleMember || "김민지",
              tags: tags,
              place: state.scheduleGym,
            };
            if (state.scheduleRepeat === "none") {
              scheduleData[date].sessions.push(baseSession);
            } else {
              // 반복: 선택 요일에 잔여 회차만큼 인스턴스 생성 (매주/격주)
              const member = allMembers.find(
                (m) => m.name === baseSession.name,
              );
              const total = Math.max(1, (member && member.left) || 1);
              const stepDays = state.scheduleRepeat === "biweekly" ? 14 : 7;
              const days = state.scheduleRepeatDays.length
                ? state.scheduleRepeatDays
                : [getDayData(date).weekday];

              for (let d = 0; d < 120 && made < total; d++) {
                const key = shiftKey(date, d);
                const wd = getDayData(key).weekday;
                if (!days.includes(wd)) continue;
                // 격주면 시작일 기준 주차가 짝수인 경우만

                  stepDays === 14 &&
                  Math.floor(d / 7) % 2 === 1
                )
                  continue;
                if (!scheduleData[key])
                  scheduleData[key] = { weekday: wd, sessions: [] };
                scheduleData[key].sessions.push({
                  ...baseSession,
                  recurring: true,
                });
                made++;
              }
            }
          }

          // 이번에 선택한 장소를 다음 일정 등록의 디폴트로 기억

      function addSetToExercise(exId) {
        const ex = state.recordExercises.find((e) => e.id === exId);

      /* 시작 시간 변경 시 종료 시간을 자동으로 1시간 뒤로 지정 */
      function addOneHour(t) {

      // scrollIntoView(smooth)는 속도 조절이 불가해 rAF 기반 커스텀 스크롤 사용
      function scrollCardToCenter(cardEl, duration) {
        const container = document.getElementById("scroll-container");
        if (!container) return;
        const start = container.scrollTop;
        const delta =
          cardEl.getBoundingClientRect().top -
          container.getBoundingClientRect().top -
          (container.clientHeight - cardEl.clientHeight) / 2;
        const end = Math.max(
          0,
          Math.min(
            start + delta,
            container.scrollHeight - container.clientHeight,
          ),
        );
        const t0 = performance.now();
        const ease = (t) =>
          t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        function step(now) {
          const p = Math.min((now - t0) / duration, 1);
          container.scrollTop = start + (end - start) * ease(p);
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      /* ---------------- 일정 탭 ---------------- */
      // 일간/주간 뷰가 공유하는 시간축 상수·헬퍼 (축이 항상 동일해야 전환 시 안 헷갈림)
      const SCHED_HOUR_PX = 64;
      let lastScheduleView = state.scheduleView; // 뷰 전환 시 스크롤 이동 트리거용
      const SCHED_TYPE_COLORS = {
        session: { main: "#FF4E00", bg: "#FFFAF7", weekBg: "#FFE4D4" },
        consult: { main: "#3182F6", bg: "#F7FAFE", weekBg: "#D0E6FF" },
        etc: { main: "#02B262", bg: "#F5FCF9", weekBg: "#C0F0DA" },
      };

      // 날짜 키("7.14") → "2026.07.14" 형식 변환
      function fmtDate(key) {
        const [m, d] = key.split(".");
        return `2026.${String(m).padStart(2,"0")}.${String(d).padStart(2,"0")}`;
      }
      const SCHED_NOW_MIN = 13 * 60 + 12; // 목업 현재 시각 13:12

      // 날짜 키 산술 (주간/일간 이동, 데이터 없는 날짜도 요일 계산 가능)
      const WEEKDAY_NAMES = ["일", "월", "화", "수", "목", "금", "토"];
      function keyToDateObj(key) {
        const [m, d] = key.split(".").map(Number);
        return new Date(2026, m - 1, d);
      }
      function shiftKey(key, days) {
        const dt = keyToDateObj(key);
        dt.setDate(dt.getDate() + days);
        return `${dt.getMonth() + 1}.${dt.getDate()}`;
      }
      // 장소 필터(다중 토글) 적용된 세션 목록 — 꺼진 센터만 숨김, 개인 일정은 항상 표시
      function visibleSessions(d) {
        if (!state.hiddenGyms.length) return d.sessions;
        return d.sessions.filter(
          (s) =>
            s.type === "etc" ||
            !state.hiddenGyms.includes(s.gym || s.place || gyms[0]),
        );
      }

      // 데이터 없는 날짜는 빈 세션으로 (주간 이동 시 필요)
      function getDayData(key) {
        return (
          scheduleData[key] || {
            weekday: WEEKDAY_NAMES[keyToDateObj(key).getDay()],
            sessions: [],
          }
        );
      }
      // 해당 날짜가 속한 주(일~토)의 7개 키
      function weekKeysOf(key) {
        const start = shiftKey(key, -keyToDateObj(key).getDay());
        return Array.from({ length: 7 }, (_, i) => shiftKey(start, i));
      }

      function schedToMin(t) {
        const [h, m] = t.split(":").map(Number);
        return h * 60 + m;
      }

      // 수업 세션 상태: upcoming(예정) | done(완료·기록됨) | needsRecord(지남·미기록) | requested(요청 대기)
      function sessionStatus(dateKey, s) {
        if (s.status === "requested") return "requested";
        if (s.recorded) return "done";
        const dt = keyToDateObj(dateKey);
        const today = keyToDateObj(TODAY_DATE);
        const past =
          dt < today ||
          (dt.getTime() === today.getTime() &&
            schedToMin(s.time) < SCHED_NOW_MIN);
        return past ? "needsRecord" : "upcoming";
      }

      // 세션 → 유형/부가정보/탭 액션/시작·종료(분) 분류
      function classifySession(s, dateKey) {
        const isConsult = s.tags.includes("상담");
        const isPersonal = s.type === "etc";
        const type = isConsult ? "consult" : isPersonal ? "etc" : "session";
        const status =
          type === "session" ? sessionStatus(dateKey || TODAY_DATE, s) : "";
        const detail =
          type === "session"
            ? s.tags.join(" · ")
            : type === "etc" && s.tags.some((t) => t.startsWith("기타:"))
              ? s.tags.find((t) => t.startsWith("기타:")).slice(4)
              : "";
        return {
          s,
          type,
          status,
          detail,
          start: schedToMin(s.time),
          end: schedToMin(s.endTime || addOneHour(s.time)),
          action: isConsult
            ? `openConsultDetail:${s.name}`
            : isPersonal
              ? ""
              : status === "requested"
                ? `openLessonRequest:${dateKey || TODAY_DATE}:${s.name}`
                : status === "done"
                  ? `openSessionSummary:${dateKey || TODAY_DATE}:${s.name}`
                  : `openRecordNew:${dateKey || TODAY_DATE}:${s.name}`,
        };
      }

      // 00~24시 시간 라벨 + 가로줄
      // weekOnly=true 이면 라벨 없이 선만 표시
      function schedHoursHtml(startHour, endHour, weekOnly) {
        const rows = [];
        for (let h = startHour; h <= endHour; h++) {
          if (weekOnly) {
            rows.push(`
        <div style="position:absolute;top:${(h - startHour) * SCHED_HOUR_PX}px;left:0;right:0;display:flex;align-items:center;transform:translateY(-50%)">
          <span style="flex:1;height:1px;background:#F2F4F6"></span>
        </div>`);
          } else {
            rows.push(`
        <div style="position:absolute;top:${(h - startHour) * SCHED_HOUR_PX}px;left:0;right:0;display:flex;align-items:center;gap:8px;transform:translateY(-50%)">
          <span style="width:32px;font-size:12px;color:#B0B8C1;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0">${String(h).padStart(2, "0")}:00</span>
          <span style="flex:1;height:1px;background:#F2F4F6"></span>
        </div>`);
          }
        }
        return rows.join("");
      }

      // 주간 스트립 (일간 뷰 상단 + 월간→일간 모프 오버레이에서 공유)
      function schedWeekStripHtml(selectedKey) {
        return weekKeysOf(selectedKey)
          .map((key) => {
            const d = getDayData(key);
            const n = key.split(".")[1];
            const active = key === selectedKey;
            const visCount = visibleSessions(d).length;
            const hasSession = visCount > 0;
            const dot = hasSession ? "#B0B8C1" : "transparent";
            const weekendColor =
              d.weekday === "일"
                ? "#F04452"
                : d.weekday === "토"
                  ? "#3182F6"
                  : null;
            return `
    <div data-action="selectScheduleDate:${key}" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0 8px">
      <span style="font-size:12px;color:${active ? weekendColor || "#191F28" : weekendColor || "#8B95A1"};font-weight:${active ? 600 : 400}">${d.weekday}</span>
      <span style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:${active ? 600 : 500};${active ? "border-radius:999px;background:#FF4E00;box-shadow:0 4px 12px rgba(255,78,0,.3);color:#FFFFFF" : `font-variant-numeric:tabular-nums;color:${weekendColor || "#191F28"}`}">${n}</span>
      ${
        active
          ? `<span style="height:14px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#191F28;font-variant-numeric:tabular-nums;line-height:1">${visCount}건</span>`
          : `<span style="height:14px;display:flex;align-items:center"><span style="width:4px;height:4px;border-radius:99px;background:${dot}"></span></span>`
      }
    </div>`;
          })
          .join("");
      }

      // 현재 시간 표시선: 시간 칩 + 빨간 선 (일간/주간 공유)
      // withId: now-line id 부여 여부 / weekMode: 주간뷰에서는 시간첩 좌측 고정, 우측 점 제거
      function schedNowLineHtml(withId, weekMode) {
        if (weekMode) {
          return `
        <div ${withId ? 'id="now-line"' : ""} style="position:absolute;top:${(SCHED_NOW_MIN / 60) * SCHED_HOUR_PX}px;left:0;right:0;display:flex;align-items:center;transform:translateY(-50%);z-index:3;pointer-events:none">
          <span style="background:#E63E00;color:#FFFFFF;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;padding:2px 5px;border-radius:5px;flex-shrink:0;margin-left:6px;margin-right:4px">13:12</span>
          <span style="flex:1;height:2px;background:#E63E00"></span>
        </div>`;
        }
        return `
        <div ${withId ? 'id="now-line"' : ""} style="position:absolute;top:${(SCHED_NOW_MIN / 60) * SCHED_HOUR_PX}px;left:0;right:0;display:flex;align-items:center;transform:translateY(-50%);z-index:3;pointer-events:none">
          <span style="width:38px;flex-shrink:0;display:flex;justify-content:flex-end">
            <span style="background:#E63E00;color:#FFFFFF;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;padding:2px 6px;border-radius:6px;flex-shrink:0">13:12</span>
          </span>
          <span style="flex:1;height:2px;background:#E63E00"></span>
        </div>`;
      }

      // 일간 타임라인 그리드 (일간 뷰 본문 + 모프 오버레이에서 공유)
      function schedDayGridHtml(dateKey, withId) {
        const current = getDayData(dateKey);
        const isToday = dateKey === TODAY_DATE;
        const events = visibleSessions(current).map((s) =>
          classifySession(s, dateKey),
        );

        // 블록 높이는 실제 시간에 비례하되 상하 2px씩만 띄워 라인과 살짝 분리
        // (50분 수업의 10분 공백 같은 틈은 그대로 노출되어 빈 시간이 읽힘)
        // [막대바] [일정타입] [제목]  부위태그 ... [시작시간] 가로 배치
        const eventsHtml = events
          .map((e) => {
            const c = SCHED_TYPE_COLORS[e.type];
            const top = (e.start / 60) * SCHED_HOUR_PX + 2;
            const height = Math.max(
              ((e.end - e.start) / 60) * SCHED_HOUR_PX - 4,
              24, // 25분 미만 수업도 한 줄 텍스트가 들어가는 최소 높이
            );
            const typeLabel =
              e.type === "consult" ? "상담" : e.type === "etc" ? "기타" : "수업";
            // 완료 수업: 회색 톤 / 요청 대기: 점선 테두리 / 지남·미기록: 원래 색 + 뱃지
            const done = e.status === "done";
            const requested = e.status === "requested";
            const barColor = done
              ? "#C4CBD4"
              : requested
                ? "transparent"
                : c.main;
            const bgColor = done ? "#F7F8F9" : requested ? "#FFFAF7" : c.bg;
            const typeColor = done ? "#8B95A1" : c.main;
            const nameColor = done ? "#4E5968" : "#191F28";
            // 상태 칩: 시작 시간 왼쪽 동일 위치 (완료=회색 / 미기록·요청=주황)
            const statusChip = done
              ? `<span style="font-size:12px;font-weight:600;color:#6B7684;background:#E5E8EB;padding:2px 6px;border-radius:6px;flex-shrink:0">기록 완료</span>`
              : requested
                ? `<span style="font-size:12px;font-weight:600;color:#FF4E00;background:#FFE9E0;padding:2px 6px;border-radius:6px;flex-shrink:0">요청</span>`
                : e.status === "needsRecord"
                  ? `<span style="font-size:12px;font-weight:600;color:#FF4E00;background:#FFE9E0;padding:2px 6px;border-radius:6px;flex-shrink:0">기록 필요</span>`
                  : "";
            return `
        <div data-action="${e.action}" style="position:absolute;top:${top}px;height:${height}px;left:0;right:0;box-sizing:border-box;overflow:hidden;display:flex;cursor:pointer;${requested ? "border:1.5px dashed #FF8A3D;border-radius:6px" : ""}">
          <span style="width:4px;align-self:stretch;background:${barColor};flex-shrink:0"></span>
          <div style="flex:1;min-width:0;background:${bgColor};display:flex;align-items:center;gap:8px;padding:0 10px 0 8px;overflow:hidden">
            <span style="font-size:12px;font-weight:600;color:${typeColor};flex-shrink:0">${typeLabel}</span>
            <span style="font-size:14px;font-weight:600;color:${nameColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.s.name}</span>
            ${e.s.recurring ? '<svg viewBox="0 0 24 24" style="width:12px;height:12px;flex-shrink:0" fill="none" stroke="#8B95A1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>' : ""}
            ${e.detail ? `<span style="font-size:12px;color:#8B95A1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.detail}</span>` : ""}
            <span style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0">${statusChip}<span style="font-size:12px;color:#B0B8C1;font-variant-numeric:tabular-nums">${e.s.time}</span></span>
          </div>
        </div>`;
          })
          .join("");

        return `
      <div ${withId ? 'id="time-grid"' : ""} style="position:relative;height:${24 * SCHED_HOUR_PX}px;margin:24px 20px 0">
        <!-- 클리핑 영역을 그리드보다 위/왼쪽으로 넓혀 00:00 라벨과 현재시간 칩이 잘리지 않게 함 -->
        <div style="position:absolute;top:-16px;bottom:-16px;left:-20px;right:0;overflow:hidden">
          <div data-swipe-strip style="position:absolute;top:0;bottom:0;left:0;width:300%;display:flex;transform:translateX(-33.3333%)">
            <div style="flex:0 0 33.3333%;position:relative">
              <div style="position:absolute;top:16px;bottom:16px;left:20px;right:0">${schedHoursHtml(0, 24)}</div>
            </div>
            <div style="flex:0 0 33.3333%;position:relative">
              <div style="position:absolute;top:16px;bottom:16px;left:20px;right:0">
                ${schedHoursHtml(0, 24)}
                <div data-action="openScheduleSheet" style="position:absolute;top:0;bottom:0;left:40px;right:0;cursor:pointer">
                  ${eventsHtml}
                </div>
                ${isToday ? schedNowLineHtml(withId) : ""}
              </div>
            </div>
            <div style="flex:0 0 33.3333%;position:relative">
              <div style="position:absolute;top:16px;bottom:16px;left:20px;right:0">${schedHoursHtml(0, 24)}</div>
            </div>
          </div>
        </div>
      </div>`;
      }

      // 트레이너 확정 대기 중인 회원 요청 목록
      function pendingRequests() {
        const out = [];
        Object.keys(scheduleData).forEach((k) =>
          scheduleData[k].sessions.forEach((s) => {
            if (s.status === "requested") out.push({ dateKey: k, s });
          }),
        );
        return out;
      }

      // 지났는데 아직 기록하지 않은 수업 목록 (최근 순)
      function unrecordedSessions() {
        const out = [];
        Object.keys(scheduleData).forEach((k) =>
          scheduleData[k].sessions.forEach((s) => {
            if (
              s.type !== "etc" &&
              !s.tags.includes("상담") &&
              sessionStatus(k, s) === "needsRecord"
            )
              out.push({ dateKey: k, s });
          }),
        );
        const ord = (e) => {
          const [m, d] = e.dateKey.split(".").map(Number);
          return m * 31 * 1440 + d * 1440 + schedToMin(e.s.time);
        };
        return out.sort((a, b) => ord(b) - ord(a));
      }

      // 일정 탭 공통 고정 헤더 (타임트리 스타일, 모든 뷰 동일 높이)
      // [날짜+▾(뷰 전환)]              [알림+숫자 배지]
      // [장소 필터 칩(사진+딤+체크)]      [접기/펼치기 토글]
      // ── 전체 너비 구분선 ──
      function scheduleHeaderHtml() {
        // 날짜 라벨: 일간은 "7월 14일", 주간/월간은 "2026년 7월"
        let label;
        if (state.scheduleView === "day") {
          const [m, d] = state.scheduleDate.split(".");
          label = `${m}월 ${d}일`;
        } else if (state.scheduleView === "week") {
          label = `2026년 ${Number(state.scheduleDate.split(".")[0])}월`;
        } else {
          label = `${state.calendarYear || 2026}년 ${state.calendarMonth || 7}월`;
        }

        const item = (t, view) => {
          const active = state.scheduleView === view;
          return `<span data-action="setScheduleView:${view}" style="display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;font-weight:${active ? 600 : 500};color:#191F28;padding:12px 14px;border-radius:8px;cursor:pointer">${t}${active ? '<span style="color:#FF4E00;font-size:14px;font-weight:600">✓</span>' : ""}</span>`;
        };
        const menu = state.scheduleViewMenu
          ? `
          <div style="position:absolute;top:36px;left:0;z-index:12;background:#FFFFFF;border-radius:12px;box-shadow:0 4px 20px rgba(25,31,40,.16);padding:6px;min-width:120px;display:flex;flex-direction:column">
            ${item("일간", "day")}
            ${item("주간", "week")}
            ${item("월간", "month")}
          </div>`
          : "";

        // 알림함: 종 아이콘 + 배지(조율 요청 + 미기록 수업 합계) → 알림 풀페이지
        const reqCount =
          pendingRequests().length + unrecordedSessions().length;
        const bell = `
          <span data-action="openNotifications" style="position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer">
            <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
            ${reqCount ? `<span style="position:absolute;top:0;right:0;min-width:16px;height:16px;border-radius:999px;background:#FF4E00;color:#FFFFFF;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 4px;box-sizing:border-box;line-height:1">${reqCount}</span>` : ""}
          </span>`;

        // 장소 칩: 센터 사진(줄무늬 목업) 위 딤드+체크, 꺼진 센터는 회색 이름
        const chip = (g) => {
          const on = !state.hiddenGyms.includes(g);
          return `
          <span data-action="toggleGymChip:${g}" style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:12px;background:#F2F4F6;cursor:pointer">
            <span style="position:relative;width:28px;height:28px;border-radius:8px;overflow:hidden;flex-shrink:0;background:repeating-linear-gradient(45deg,#E1E5EA,#E1E5EA 5px,#D1D6DB 5px,#D1D6DB 10px)">
              ${on ? '<span style="position:absolute;inset:0;background:rgba(25,31,40,.45);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12.5 9.5 18 20 6.5"></polyline></svg></span>' : ""}
            </span>
            <span style="font-size:14px;font-weight:600;color:${on ? "#191F28" : "#B0B8C1"};white-space:nowrap">${g.split(" ")[0]}</span>
          </span>`;
        };
        // 칩이 여러 줄로 감기는 구조: 접힘=첫 줄만(36px), 펼침=최대 3줄(120px)+내부 스크롤
        // 토글 버튼은 칩이 한 줄을 넘칠 때만 노출 (렌더 후 측정해서 결정)
        const gymRow =
          gyms.length < 2
            ? ""
            : `
        <div style="display:flex;align-items:flex-start;gap:6px;padding:10px 20px 12px">
          <div id="gym-chip-wrap" class="no-scrollbar" style="flex:1;max-height:${state.gymRowOpen ? "120px" : "36px"};overflow-y:${state.gymRowOpen ? "auto" : "hidden"};transition:max-height 0.3s ease">
            <div style="display:flex;flex-wrap:wrap;gap:6px">${gyms.map(chip).join("")}</div>
          </div>
          <span id="gym-row-toggle" data-action="toggleGymRow" style="width:32px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
            <span id="gym-row-toggle-icon" style="display:flex;transition:transform 0.3s ease;transform:rotate(${state.gymRowOpen ? "180deg" : "0deg"})">
              <svg viewBox="0 0 24 24" style="width:16px;height:16px" fill="none" stroke="#8B95A1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 5.5 12 10.5 17 5.5"></polyline><polyline points="7 13.5 12 18.5 17 13.5"></polyline></svg>
            </span>
          </span>
        </div>`;

        return `
    <div style="flex-shrink:0;background:#FFFFFF">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0">
        <span data-action="toggleScheduleViewMenu" style="position:relative;z-index:20;display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0">
          <span style="font-size:20px;font-weight:600;color:#191F28;letter-spacing:-0.5px;font-variant-numeric:tabular-nums">${label}</span>
          <svg viewBox="0 0 24 24" style="width:14px;height:14px" fill="#8B95A1"><path d="M12 16 5.5 9h13L12 16z"/></svg>
          ${menu}
        </span>
        ${bell}
      </div>
      ${gymRow}
      <div style="height:1px;background:#EFF2F5"></div>
    </div>`;
      }

      function renderSchedule() {
        if (state.scheduleView === "week") return renderScheduleWeek();
        if (state.scheduleView === "month") return renderScheduleMonth();

        return `
  <div id="schedule-view-root" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    ${scheduleHeaderHtml()}
    <div id="scroll-container" class="no-scrollbar" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;touch-action:pan-y">
      <div style="position:sticky;top:0;z-index:5;background:#FFFFFF;border-bottom:1px solid #EFF2F5;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:10px 20px">${schedWeekStripHtml(state.scheduleDate)}</div>
      <div style="flex:1;background:#FFFFFF;padding:0 0 140px;display:flex;flex-direction:column">
        ${schedDayGridHtml(state.scheduleDate, true)}
      </div>
    </div>
  </div>`;
      }

      // 주간 뷰: 일간과 동일한 세로 시간축의 7컬럼 그리드 (컬럼 탭 → 일간 드릴다운)
      function renderScheduleWeek() {
        const dateKeys = weekKeysOf(state.scheduleDate);
        const prevKeys = weekKeysOf(shiftKey(dateKeys[0], -7));
        const nextKeys = weekKeysOf(shiftKey(dateKeys[0], 7));
        const gridHeight = 24 * SCHED_HOUR_PX;

        const colHeadsHtml = (keys) =>
          keys
            .map((key) => {
              const d = getDayData(key);
              const n = key.split(".")[1];
              const weekendColor =
                d.weekday === "일"
                  ? "#F04452"
                  : d.weekday === "토"
                    ? "#3182F6"
                    : null;
              // 오늘 표시 없음: 채운 원은 일간 뷰의 "선택 날짜" 기호와 겹쳐 혼동을 줌
              return `
      <div data-action="selectWeekDay:${key}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;cursor:pointer">
        <span style="font-size:12px;color:${weekendColor || "#8B95A1"}">${d.weekday}</span>
        <span style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-variant-numeric:tabular-nums;color:${weekendColor || "#191F28"}">${n}</span>
        <span style="height:14px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#8B95A1;font-variant-numeric:tabular-nums;line-height:1">${visibleSessions(d).length ? `${visibleSessions(d).length}건` : ""}</span>
      </div>`;
            })
            .join("");

        // 시간축 없이 7컬럼 전체 사용. 블록에 이름+시작시간 세로 표시
        const colsHtml = dateKeys
          .map((key, idx) => {
            const d = getDayData(key);
            const blocks = visibleSessions(d)
              .map((s) => {
                const e = classifySession(s, key);
                const c = SCHED_TYPE_COLORS[e.type];
                const top = (e.start / 60) * SCHED_HOUR_PX + 2;
                const height = Math.max(
                  ((e.end - e.start) / 60) * SCHED_HOUR_PX - 4,
                  24,
                );
                const showTime = height >= 38;
                const done = e.status === "done";
                const requested = e.status === "requested";
                return `<div data-action="${e.action}" style="position:absolute;top:${top}px;height:${height}px;left:1px;right:1px;background:${done ? "#E9ECEF" : requested ? "#FFFAF7" : c.weekBg};border-radius:3px;box-sizing:border-box;overflow:hidden;padding:3px 4px;display:flex;flex-direction:column;gap:1px;cursor:pointer;${requested ? "border:1.5px dashed #FF8A3D" : ""}"><span style="font-size:12px;font-weight:700;color:${done ? "#8B95A1" : "#191F28"};line-height:1.3;white-space:nowrap;overflow:hidden;display:block">${e.s.name}</span>${showTime ? `<span style="font-size:10px;color:${done ? "#8B95A1" : "#4E5968"};font-variant-numeric:tabular-nums;line-height:1.3;white-space:nowrap;overflow:hidden">${e.s.time}</span>` : ""}</div>`;
              })
              .join("");
            return `
      <div data-action="openScheduleSheet" style="position:absolute;top:0;bottom:0;left:${(idx * 100) / 7}%;width:${100 / 7}%;cursor:pointer">
        ${blocks}
      </div>`;
          })
          .join("");

      // 월간 뷰: 풀스크린 월 그리드 (날짜 탭 → 선택 주가 상승하며 일간으로 모프)
      function renderScheduleMonth() {
        const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
        const weekdaysHtml = weekdays
          .map(
            (w, i) =>
              `<span style="font-size:12px;font-weight:600;color:${i === 0 ? "#F04452" : i === 6 ? "#3182F6" : "#8B95A1"};text-align:center;padding:8px 0">${w}</span>`,
          )
          .join("");

        const year = state.calendarYear || 2026;
        const month = state.calendarMonth || 7;

        // 월 그리드 행 생성 — full=false면 날짜만 (스와이프 중 이웃 달 프리뷰용, 상세는 전환 완료 시)
        const monthRowsHtml = (y, m, full) => {
          const firstDay = new Date(y, m - 1, 1).getDay();
          const lastDate = new Date(y, m, 0).getDate();
          const cells = [];
          for (let i = 0; i < firstDay; i++) cells.push(`<span></span>`);
          for (let d = 1; d <= lastDate; d++) {
            const dateKey = `${m}.${d}`;
            const weekIdx = Math.floor((firstDay + d - 1) / 7);
            const sessions = scheduleData[dateKey]
              ? visibleSessions(scheduleData[dateKey])
              : [];
            const consultCount = sessions.filter((s) =>
              s.tags.includes("상담"),
            ).length;
            const etcCount = sessions.filter((s) => s.type === "etc").length;
            const sessionCount = sessions.length - consultCount - etcCount;
            const dow = (firstDay + d - 1) % 7;
            const dateColor =
              dow === 0 ? "#F04452" : dow === 6 ? "#3182F6" : "#191F28";

            const band = (label, count, color, bg) =>
              count
                ? `<span style="display:block;width:100%;box-sizing:border-box;font-size:12px;font-weight:600;color:${color};background:${bg};border-radius:4px;padding:2px 0;text-align:center">${label} ${count}</span>`
                : "";
            const bandsHtml = full
              ? `
              <div style="display:flex;flex-direction:column;gap:2px;width:100%;padding:0 2px;box-sizing:border-box;margin-top:4px">
                ${band("수업", sessionCount, "#E63E00", "#FFE9E0")}
                ${band("상담", consultCount, "#1B64DA", "#E8F3FF")}
                ${band("기타", etcCount, "#028A55", "#DFF7EB")}
              </div>`
              : "";

            cells.push(`
            <div ${full ? `data-action="selectMonthDate:${dateKey}:${weekIdx}"` : ""} style="display:flex;flex-direction:column;align-items:center;padding:6px 0;cursor:pointer;min-height:96px">
              <span style="font-size:16px;font-weight:500;color:${dateColor};font-variant-numeric:tabular-nums">${d}</span>
              ${bandsHtml}
            </div>
          `);
          }

          // 주 단위 행으로 묶어 렌더 (일간 전환 시 행 단위 모프 애니메이션 대상)
          const weekRows = [];
          for (let i = 0; i < cells.length; i += 7) {
            weekRows.push(
              `<div ${full ? "data-week-row" : ""} style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells.slice(i, i + 7).join("")}</div>`,
            );
          }
          return weekRows.join("");
        };

        const prevY = month === 1 ? year - 1 : year;
        const prevM = month === 1 ? 12 : month - 1;
        const nextY = month === 12 ? year + 1 : year;
        const nextM = month === 12 ? 1 : month + 1;

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">

    <div id="scroll-container" class="no-scrollbar" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;touch-action:pan-y">
      <div data-month-weekdays style="position:sticky;top:0;z-index:5;background:#FFFFFF;border-bottom:1px solid #EFF2F5;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:8px 20px 2px">${weekdaysHtml}</div>

        <div style="overflow:hidden">
          <div data-swipe-strip style="display:flex;width:300%;transform:translateX(-33.3333%)">
            <div style="flex:0 0 33.3333%;box-sizing:border-box;padding:0 20px;display:flex;flex-direction:column;gap:4px">${monthRowsHtml(prevY, prevM, false)}</div>
            <div style="flex:0 0 33.3333%;box-sizing:border-box;padding:0 20px;display:flex;flex-direction:column;gap:4px">${monthRowsHtml(year, month, true)}</div>
            <div style="flex:0 0 33.3333%;box-sizing:border-box;padding:0 20px;display:flex;flex-direction:column;gap:4px">${monthRowsHtml(nextY, nextM, false)}</div>

      }

      // 월간 → 일간 모프 전환 (애플 캘린더 스타일):
      // - 선택 주 위의 주들: 선택 주와 함께 위로 밀려 올라가며 페이드아웃
      // - 선택 주: 함께 올라가며 페이드아웃, 그 위(z축)에 주간 스트립이
      //   선택 요일 활성 상태로 크로스페이드되며 정위치에 안착
      // - 선택 주 아래의 주들: 아래로 밀려 내려가며 페이드아웃
      // - 타임라인: 아래 주들이 하단에 도달할 즈음부터 아래에서 교차하며 위로 드러남
      function selectMonthDateWithMorph(dateKey, weekIdxStr) {
        const go = () => {
          set({
            scheduleDate: dateKey,
            scheduleView: "day",
            scheduleViewMenu: false,
          });
          // 전환 후에는 맨 위(00시)부터 — 오버레이가 보여주던 화면과 동일
          const sc = document.getElementById("scroll-container");
          if (sc) sc.scrollTop = 0;
        };
        const container = document.getElementById("scroll-container");
        const rows = Array.from(document.querySelectorAll("[data-week-row]"));
        const weekdaysRow = document.querySelector("[data-month-weekdays]");
        const targetIdx = parseInt(weekIdxStr, 10);
        const target = rows[targetIdx];
        if (!container || !target || !weekdaysRow) {
          go();
          return;
        }
        const screen = container.parentElement; // position:relative 스크린 루트
        const rootRect = screen.getBoundingClientRect();
        const D = 360; // 주 이동/페이드 시간(ms)

        // 최종 스트립 위치 = 요일 라인 자리 (일간 뷰도 같은 헤더 높이라 스트립이 이 자리에 옴)
        const stripFinalTop =
          weekdaysRow.getBoundingClientRect().top - rootRect.top;
        const targetTop = target.getBoundingClientRect().top - rootRect.top;
        // 위로 가는 주들: 모두 같은 거리만큼 등속 이동 (간격 유지)
        const dyUp = Math.max(targetTop - stripFinalTop, 0);
        // 아래로 가는 주들: 첫 번째 아래 주가 화면 하단에 닿는 거리만큼 모두 등속 이동
        const firstBelow = rows[targetIdx + 1];
        const dyDown = firstBelow
          ? rootRect.height -
            (firstBelow.getBoundingClientRect().top - rootRect.top)
          : 0;

        // 주 행들이 요일 라인 위/화면 밖으로 나가기 전에 잘리도록 클리핑
        const rowsWrap = rows[0].parentElement;
        rowsWrap.style.overflow = "hidden";

        // 주간 스트립 오버레이: 선택 주와 z축으로 겹친 채 함께 올라가며 크로스페이드
        // (스트립의 날짜 줄이 월간 행의 날짜 줄과 겹치도록 요일 줄 높이만큼 보정)
        const STRIP_DATE_OFFSET = 34; // 스트립 상단 패딩(16) + 요일 줄(12+6)
        const strip = document.createElement("div");
        strip.style.cssText = `position:absolute;left:0;right:0;top:${targetTop - STRIP_DATE_OFFSET}px;z-index:7;background:#FFFFFF;border-bottom:1px solid #EFF2F5;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:16px 20px 10px;opacity:0;transition:top ${D}ms ease, opacity ${D}ms ease;pointer-events:none`;
        strip.innerHTML = schedWeekStripHtml(dateKey);
        screen.appendChild(strip);
        const stripH = strip.offsetHeight;

        // 타임라인 오버레이: 아래 주들이 하단에 닿을 즈음부터 아래에서 교차하며 등장 (00시부터)
        const timeline = document.createElement("div");
        timeline.style.cssText = `position:absolute;left:0;right:0;top:${stripFinalTop + stripH}px;bottom:0;z-index:6;background:#FFFFFF;overflow:hidden;opacity:0;transform:translateY(${Math.round(rootRect.height * 0.6)}px);transition:transform ${D}ms ease ${Math.round(D * 0.35)}ms, opacity ${D}ms ease ${Math.round(D * 0.35)}ms;pointer-events:none`;
        timeline.innerHTML = schedDayGridHtml(dateKey, false);
        screen.appendChild(timeline);

        // 주 행 이동과 오버레이 애니메이션이 같은 프레임에 시작되도록 동기화
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            rows.forEach((r, i) => {
              r.style.transition = `transform ${D}ms ease, opacity ${D}ms ease`;
              r.style.transform =
                i <= targetIdx
                  ? `translateY(-${dyUp}px)`
                  : `translateY(${Math.max(dyDown, 0)}px)`;
              r.style.opacity = "0";
            });
            strip.style.top = `${stripFinalTop}px`;
            strip.style.opacity = "1";
            timeline.style.transform = "translateY(0)";
            timeline.style.opacity = "1";
          });
        });

        setTimeout(go, D + Math.round(D * 0.45));
      }

      /* ---------------- PT 수업 기록 ---------------- */

        <span style="width:64px;height:64px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:ui-monospace,monospace;color:#8B95A1;flex-shrink:0">▶</span>
        <span style="width:64px;height:64px;border-radius:10px;border:1.5px dashed #B0B8C1;display:flex;align-items:center;justify-content:center;font-size:20px;color:#8B95A1;flex-shrink:0">+</span>

      <div style="font-size:14px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:10px 14px">${ex.note}</div>`

      // 완료 수업 요약: 입력 폼이 아니라 리포트 느낌의 읽기 전용 화면
      function renderSessionSummary() {
        const name = state.summaryMemberName;
        const dateKey = state.summaryDateKey;
        // 해당 세션의 시간·부위 메타 (없으면 목업 기본값)
        const day = scheduleData[dateKey];
        const session =
          day &&
          day.sessions.find((x) => x.name === name && !x.tags.includes("상담"));
        const time = session ? session.time : "10:00";
        const parts = session ? session.tags.join(" · ") : "가슴어깨";

        // 저장된 기록 목업
        const saved = makeDefaultRecordExercises();
        const exCards = saved
          .map((ex) => {
            const setRows = ex.sets
              .map(
                (st, i) => `
            <div style="display:flex;align-items:center;gap:12px;padding:8px 0">
              <span style="width:44px;font-size:14px;color:#8B95A1;font-variant-numeric:tabular-nums">${i + 1}세트</span>
              <span style="font-size:14px;font-weight:600;color:#191F28;font-variant-numeric:tabular-nums">${st.kg}<span style="font-weight:500;color:#8B95A1">kg</span> × ${st.rep}<span style="font-weight:500;color:#8B95A1">회</span></span>
            </div>`,
              )
              .join(
                '<div style="height:1px;background:#F8F9FA"></div>',
              );
            return `
        <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:16px;font-weight:600;color:#191F28">${ex.name}</span>
            ${ex.hasMedia ? '<span style="font-size:12px;font-weight:600;color:#1B64DA;background:#E8F3FF;padding:2px 8px;border-radius:6px">영상 1</span>' : ""}
            <span style="margin-left:auto;font-size:14px;color:#8B95A1;font-variant-numeric:tabular-nums">${ex.sets.length}세트</span>
          </div>
          <div style="display:flex;flex-direction:column">${setRows}</div>
          ${ex.note ? `<div style="font-size:14px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:12px 14px">${ex.note}</div>` : ""}
        </div>`;
          })
          .join("");

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backSummary" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">${name} <span style="color:#4E5968;font-weight:500">· 12회차</span></span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#028A55;background:#DFF7EB;padding:4px 8px;border-radius:6px">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px" fill="none" stroke="#028A55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12.5 9.5 18 20 6.5"></polyline></svg>
        수업 완료
      </span>
    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:10px">
      <div style="background:#FFFFFF;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:600;color:#191F28;font-variant-numeric:tabular-nums">${fmtDate(dateKey)} · ${time}</span>
        <span style="margin-left:auto;font-size:14px;color:#8B95A1">${parts}</span>
      </div>
      ${exCards}
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:600;color:#191F28">메모</span>
        <span style="font-size:14px;line-height:1.6;color:#4E5968">전반적으로 컨디션 좋았음. 다음 수업엔 하체 위주로 진행 예정.</span>
      </div>
    </div>
    <div style="padding:12px 20px 32px">
      <div data-action="openRecordEdit" style="background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer"><span style="color:#fff;font-size:16px;font-weight:600">수정하기</span></div>
    </div>
  </div>`;
      }

      function renderConsultDetail() {
        const member = allMembers.find(
          (m) => m.name === state.consultTargetName,

        const hasRecord = !!(
          member &&
          (member.consultMemo || member.consultPurpose)
        );
        const registerBtn =
          member && member.isUnregistered && hasRecord
            ? `
            <div data-action="registerUnregisteredMember:${state.consultTargetName}" style="background:#FFFFFF;border-radius:14px;padding:18px 0;text-align:center;cursor:pointer;margin-bottom:12px;border:1.5px solid #FF4E00;box-shadow:0 4px 12px rgba(25,31,40,0.04)">
              <span style="color:#FF4E00;font-size:16px;font-weight:600">회원으로 등록</span>
            </div>`
            : "";
        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backConsultDetail" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:600;color:#191F28">상담 기록 <span style="color:#4E5968;font-weight:500">· ${state.consultTargetName}</span></span>
    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:12px">

        <span style="font-size:14px;font-weight:600;color:#191F28">방문 목적</span>
        <input type="text" placeholder="예: 체중 감량, 재활 등" value="${state.consultTargetPurpose || ""}" oninput="state.consultTargetPurpose = this.value" style="width:100%;border:none;background:#F2F4F6;border-radius:10px;padding:12px 16px;font-size:14px;color:#191F28;outline:none" />
      </div>
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:600;color:#191F28">상담 특이사항 및 메모</span>
        <textarea placeholder="과거 부상 부위, 운동 경험, 회원님 요구사항 등 상세 메모" oninput="state.consultTargetMemo = this.value" style="width:100%;height:140px;border:none;background:#F2F4F6;border-radius:10px;padding:12px 16px;font-size:14px;color:#191F28;outline:none;resize:none">${state.consultTargetMemo || ""}</textarea>
      </div>
    </div>
    <div style="padding:12px 20px 32px">
      ${registerBtn}
      <div data-action="completeConsult" style="background:#FF4E00;border-radius:14px;padding:18px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3);cursor:pointer"><span style="color:#fff;font-size:16px;font-weight:600">기록 완료</span></div>
    </div>
  </div>`;
      }

      /* ---------------- 회원 목록 ---------------- */
      function renderMembers() {
        const members = allMembers
          .filter((m) => {
            const genderOk =
              state.gender === "all" || m.gender === state.gender;
            const statusOk =
              state.memberFilter === "unregistered"
                ? m.isUnregistered
                : !m.isUnregistered;
            return genderOk && statusOk;
          })
          .map((m) => ({
            ...m,
            initial: m.name[0],
            leftStr: String(m.left),
            totalStr: "/" + m.total,
            leftColor: m.warn ? "#D6284A" : "#191F28",
            avBg: m.gender === "m" ? "#E8F3FF" : "#FFE9E0",
            avFg: m.gender === "m" ? "#1B64DA" : "#E63E00",
          }));

        // 일정 탭과 동일한 규격의 플랫 리스트 (흰 배경 + 인셋 디바이더)
        const rows = members
          .map((m) => {
            const countHtml = m.isUnregistered
              ? `<span style="font-size:14px;font-weight:600;color:#8B95A1">미등록</span>`
              : `<span style="font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;color:${m.leftColor}">${m.leftStr}<span style="font-size:14px;font-weight:500;color:#8B95A1">${m.totalStr}</span></span>`;
            const clickAction = m.isUnregistered
              ? `openConsultDetail:${m.name}`
              : `openMember:${m.name}`;
            const infoHtml = m.isUnregistered
              ? ""
              : `<span style="font-size:12px;color:#8B95A1">${m.info}</span>`;
            return `
    <div data-action="${clickAction}" style="padding:10px 20px;display:flex;align-items:center;gap:14px;min-height:80px">
      <span class="squircle" style="width:44px;height:44px;background:${m.avBg};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:${m.avFg};flex-shrink:0">${m.initial}</span>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px"><span style="font-size:18px;font-weight:600;color:#191F28">${m.name}</span>${infoHtml}</div>
      ${countHtml}
    </div>`;
          })
          .join(
            `<div style="height:1px;flex-shrink:0;background:#F8F9FA;margin:0 20px"></div>`,
          );

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:#FFFFFF">
    <div style="padding:20px 20px 0;display:flex;flex-direction:column;gap:12px">
      <div style="background:#F2F4F6;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px">
        <span style="width:14px;height:14px;border-radius:999px;border:2px solid #8B95A1;position:relative;flex-shrink:0"><span style="position:absolute;width:2px;height:6px;background:#8B95A1;bottom:-4px;right:-2px;transform:rotate(-45deg);border-radius:2px"></span></span>
        <span style="font-size:14px;color:#8B95A1">회원 이름 검색</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="display:flex;gap:6px;flex:1">
          <span data-action="setMemberFilter:registered" style="font-size:14px;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;${gchip(state.memberFilter === "registered")}">등록회원</span>
          <span data-action="setMemberFilter:unregistered" style="font-size:14px;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;${gchip(state.memberFilter === "unregistered")}">상담고객</span>
        </div>
        <div style="background:#F2F4F6;border-radius:999px;padding:8px 12px;display:flex;align-items:center;gap:6px">
          <select onchange="dispatch(this.value)" style="border:none;background:transparent;font-size:14px;font-weight:600;color:#4E5968;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
            <option value="setGenderAll" ${state.gender === "all" ? "selected" : ""}>성별 전체</option>
            <option value="setGenderM" ${state.gender === "m" ? "selected" : ""}>남성</option>
            <option value="setGenderF" ${state.gender === "f" ? "selected" : ""}>여성</option>
          </select>
          <svg viewBox="0 0 24 24" style="width:12px;height:12px;flex-shrink:0" fill="none" stroke="#8B95A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 24px 6px;border-bottom:1px solid #EFF2F5">
      <span style="font-size:14px;font-weight:600;color:#8B95A1">${members.length}명</span>
    </div>
    <div style="flex:1;overflow:auto;padding:0 0 140px;display:flex;flex-direction:column">${rows}</div>
  </div>`;
      }

      </div>`

      function renderDiaryCalendar(recordKeys) {
        const y = 2026;
        const m = state.diaryCalMonth;
        const firstDow = new Date(y, m - 1, 1).getDay();
        const daysInMonth = new Date(y, m, 0).getDate();

        const dowHeader = ["일", "월", "화", "수", "목", "금", "토"]
          .map(
            (d, i) =>
              `<span style="text-align:center;font-size:12px;font-weight:500;color:${i === 0 ? "#F04452" : i === 6 ? "#3182F6" : "#B0B8C1"}">${d}</span>`,
          )
          .join("");

        let cells = "";
        for (let i = 0; i < firstDow; i++) cells += "<span></span>";
        for (let d = 1; d <= daysInMonth; d++) {
          const key = `${m}.${d}`;
          const has = recordKeys.has(key);
          const sel = state.diarySelectedDate === key;
          const isToday = key === TODAY_DATE;
          const dow = (firstDow + d - 1) % 7;
          const dayColor =
            dow === 0 ? "#F04452" : dow === 6 ? "#3182F6" : "#191F28";
          // 기록 점은 별도 줄이 아니라 날짜 원 하단에 배지처럼 겹쳐 붙여
          // 어느 날짜의 점인지 명확하게 (흰 링으로 원과 분리)
          cells += `
            <span data-action="selectDiaryDate:${key}" style="display:flex;flex-direction:column;align-items:center;padding:4px 0;cursor:pointer">
              <span style="position:relative;width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:14px;font-variant-numeric:tabular-nums;${
                sel
                  ? "background:#191F28;color:#FFFFFF;font-weight:600"
                  : `color:${dayColor};font-weight:${has ? 600 : 400}`
              }${!sel && isToday ? ";background:#F2F4F6" : ""}">${d}${
                has
                  ? `<span style="position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:999px;background:#FF4E00;box-shadow:0 0 0 2px #FFFFFF"></span>`
                  : ""
              }</span>
            </span>`;
        }

        const chev = (points, action) => `
          <span data-action="${action}" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px" fill="none" stroke="#8B95A1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="${points}"></polyline></svg>
          </span>`;

        return `
          <div style="background:#FFFFFF;padding:6px 20px 14px;border-bottom:1px solid #F2F4F6;flex-shrink:0">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0 10px">
              <div style="display:flex;align-items:center;gap:4px">
                ${chev("15 18 9 12 15 6", "diaryCalPrev")}

                ${chev("9 18 15 12 9 6", "diaryCalNext")}

            <div style="display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px">${cells}</div>
          </div>`;
      }

            <div style="flex:1;min-height:160px;background:#FFFFFF"></div>

        `;
      }

      const bodyRecords = [
        { date: "7.10", weight: 58.4, muscle: 24.1, fat: 23.5 },
        { date: "7.3", weight: 58.8, muscle: 23.9, fat: 24.2 },
        { date: "6.26", weight: 59.2, muscle: 23.7, fat: 24.8 },

        { date: "5.25", weight: 60.1, muscle: 23.4, fat: 26.2 },

      ];

      function getDeltaStr(latestVal, oldestVal, unit) {
        const diff = latestVal - oldestVal;
        const sign = diff > 0 ? "+" : diff < 0 ? "−" : "";
        return `${sign}${Math.abs(diff).toFixed(1)}${unit}`;
      }

      function getPolylinePoints(records, key) {
        const N = records.length;
        const vals = records.map((r) => r[key]);
        const minVal = Math.min(...vals);
        const maxVal = Math.max(...vals);
        const valRange = maxVal - minVal || 1.0;

        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const coords = records.map((r, i) => {
          const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
          const y = 80 - ((r[key] - minVal) / valRange) * 72; // y between 8 and 80
          return { x, y };
        });

        return [...coords]
          .reverse()
          .map((c) => `${c.x},${c.y}`)
          .join(" ");
      }

      function renderBodyChartCard(label, key, unit) {
        let filtered = bodyRecords;
        if (state.bodyPeriod === "1m") {
          filtered = bodyRecords.slice(0, 4);
        } else if (state.bodyPeriod === "3m") {
          filtered = bodyRecords.slice(0, 7);
        }

        const N = filtered.length;

        // Find selected record (fall back to latest record)
        let selectedRec = filtered.find(
          (r) => r.date === state.selectedBodyDate,
        );
        if (!selectedRec) {
          selectedRec = filtered[0];
        }

        const valToShow = selectedRec[key];
        const oldestVal = filtered[filtered.length - 1][key];
        const deltaStr = getDeltaStr(
          valToShow,
          oldestVal,
          unit === "%" ? "%p" : unit,
        );
        const pointsStr = getPolylinePoints(filtered, key);

        const viewBoxWidth = N > 7 ? (N - 1) * 50 + 30 : 310;
        const svgWidth = N > 7 ? `calc(100% * ${(N - 1) / 6})` : "100%";

        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const xLabelsHtml = filtered
          .map((r, i) => {
            const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
            const isSelected = r.date === selectedRec.date;
            return `<text x="${x}" y="106" text-anchor="middle" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" fill="${isSelected ? "#191F28" : "#8B95A1"}" font-weight="${isSelected ? "600" : "500"}" font-variant-numeric="tabular-nums" style="cursor:pointer" data-action="selectBodyDate:${r.date}">${r.date}</text>`;
          })
          .join("");

        const circlesHtml = filtered
          .map((r, i) => {
            const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
            const vals = filtered.map((item) => item[key]);
            const minVal = Math.min(...vals);
            const maxVal = Math.max(...vals);
            const valRange = maxVal - minVal || 1.0;
            const y = 80 - ((r[key] - minVal) / valRange) * 72;

            const isSelected = r.date === selectedRec.date;
            if (isSelected) {
              return `
                <circle cx="${x}" cy="${y}" r="6" fill="#FFE9E0" stroke="#FF4E00" stroke-width="2" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
                <circle cx="${x}" cy="${y}" r="2.5" fill="#FF4E00" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
                <circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
              `;
            } else {
              return `
                <circle cx="${x}" cy="${y}" r="3.5" fill="#FF4E00" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
                <circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
              `;
            }
          })
          .join("");

        return `
  <div style="background:#F7F8F9;border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:baseline;gap:8px">
      <span style="font-size:14px;font-weight:600;color:#191F28">${label}</span>
      <span style="margin-left:auto;font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;color:#191F28">${valToShow}<span style="font-size:12px;font-weight:500;color:#4E5968">${unit}</span></span>
      <span style="font-size:12px;font-weight:600;color:#E63E00">${deltaStr}</span>
    </div>
    
    <div class="no-scrollbar" data-hscroll="body-${key}" style="overflow-x:auto;width:100%;-webkit-overflow-scrolling:touch">
      <div style="width: ${svgWidth}; min-width: 100%">
        <svg viewBox="0 0 ${viewBoxWidth} 115" style="width:100%;height:auto;display:block">
          <!-- Grid Lines -->
          <line x1="0" y1="82" x2="${viewBoxWidth}" y2="82" stroke="#E5E8EB" stroke-width="1"></line>
          <line x1="0" y1="45" x2="${viewBoxWidth}" y2="45" stroke="#E5E8EB" stroke-width="1"></line>
          <line x1="0" y1="8" x2="${viewBoxWidth}" y2="8" stroke="#E5E8EB" stroke-width="1"></line>
          
          <!-- Trend Line -->
          <polyline points="${pointsStr}" fill="none" stroke="#FF4E00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
          
          <!-- Point Circles -->
          ${circlesHtml}

          <!-- X-Axis Labels -->
          ${xLabelsHtml}
        </svg>
      </div>
    </div>
  </div>`;
      }

      // static coordinates for mapping weights to Y positions (60kg = 112, 80kg = 34)
      function getWeightY(kg) {
        const minKg = 60,
          maxKg = 80;
        const minY = 112,
          maxY = 34;
        if (kg <= minKg) return minY;
        if (kg >= maxKg) return maxY;
        return minY - ((kg - minKg) / (maxKg - minKg)) * (minY - maxY);
      }

      function renderExerciseGraph() {
        // 1. 기간에 따른 데이터 필터링
        let filteredRecords = squatRecords;
        if (state.graphPeriod === "1m") {
          filteredRecords = squatRecords.slice(0, 4); // 7.10, 7.3, 6.26, 6.19
        } else if (state.graphPeriod === "3m") {
          filteredRecords = squatRecords.slice(0, 7); // 7.10 to 5.12
        }

        // 2. 데이터 개수(N)에 따른 X좌표 동적 분배 (N > 7일 경우 7개가 화면에 꽉 차게 가로 폭 설정)
        const N = filteredRecords.length;
        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const recordsWithX = filteredRecords.map((r, i) => {
          const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
          const y = getWeightY(r.sets[0].kg); // top set weight maps to Y
          return { ...r, x, y };
        });

          (r) => r.date === state.selectedDate,

      // 센터 관리: 센터별 영업시간 + 자동 확정 대기시간 (목업)
      // 영업시간 셀 → 요약 텍스트 (요일별 연속 구간을 묶고, 평일/주말이 같으면 합침)
      function gymHoursSummary(g) {
        const cells = gymHours[g] || [];
        const rangeOf = (d) => {
          const hs = cells
            .filter((c) => c.startsWith(d + "-"))
            .map((c) => Number(c.split("-")[1]))
            .sort((a, b) => a - b);
          if (!hs.length) return "";
          const parts = [];
          let s = hs[0], p = hs[0];
          for (let i = 1; i <= hs.length; i++) {
            if (hs[i] === p + 1) { p = hs[i]; continue; }
            parts.push([s, p + 1]);
            s = hs[i];
            p = hs[i];
          }
          return parts
            .map(([a, b]) => `${String(a).padStart(2, "0")}:00 ~ ${String(b).padStart(2, "0")}:00`)
            .join(", ");
        };
        const wkDays = ["월", "화", "수", "목", "금"];
        const wk = wkDays.map(rangeOf);
        const sat = rangeOf("토");
        const sun = rangeOf("일");
        const lines = [];
        if (wk.every((r) => r === wk[0]))
          lines.push(wk[0] ? `평일 ${wk[0]}` : "평일 휴무");
        else
          wkDays.forEach((d, i) =>
            lines.push(wk[i] ? `${d} ${wk[i]}` : `${d} 휴무`),
          );
        if (sat === sun) lines.push(sat ? `주말 ${sat}` : "주말 휴무");
        else {
          lines.push(sat ? `토 ${sat}` : "토 휴무");
          lines.push(sun ? `일 ${sun}` : "일 휴무");
        }
        return lines;
      }
