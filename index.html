<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>피티수첩 — 인터랙티브 프로토타입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #000;
        font-family:
          "Pretendard Variable",
          Pretendard,
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        justify-content: center;
        align-items: stretch;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .phone {
        width: 100%;
        max-width: 430px;
        background: #f6f7f9;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      [data-action] {
        cursor: pointer;
      }
      ::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
    </style>
  </head>
  <body>
    <div class="phone" id="app"></div>

    <script>
      const CHARCOAL = "#FF4E00",
        GRAY = "#B0B8C1",
        GRAYTXT = "#8B95A1";

      const state = {
        screen: "schedule", // schedule | record | members | memberDetail | exerciseGraph | profile | myRoutines
        selectedMemberName: "김민지",
        segment: "home", // home | diary | exercise | routine (memberDetail tabs)
        sheet: null, // null | schedule | member | routine | edit | loadRoutine | exercisePicker | monthlyCalendar
        recordFrom: "schedule",
        gender: "all", // all | m | f
        diaryFilter: "session", // session | body | diet
        graphPeriod: "3m", // 1m | 3m | 6m | all
        bodyPeriod: "3m", // 1m | 3m | 6m | all
        selectedDate: "7.10",
        selectedBodyDate: "7.10",
        showAllRecords: false,
        scheduleDate: "7.14",
        recordExercises: [],
        exercisePicker: null, // { part, selected: [], replaceTarget? } while sheet === "exercisePicker"
        exerciseMenu: null, // 열려있는 운동 카드 ⋮ 메뉴의 exercise id
        scheduleParts: [], // 일정 등록 시트에서 선택한 수업 부위
        otherSchedulePart: "", // 기타 일정 상세 입력값
        showSpeedDial: false, // 스피드 다이얼 팝업 토글
        scheduleType: "session", // session (수업) | consult (상담) 일정 유형
        consultantName: "", // 상담 일정 등록 시 입력한 비회원 이름
        consultMemo: "", // 상담 일정 등록 시 입력한 메모
        consultTargetName: "", // 상담 상세 화면용 타겟 회원명
        consultTargetMemo: "", // 상담 상세 화면용 메모
        consultTargetPurpose: "", // 상담 상세 화면용 방문 목적
        memberFilter: "registered", // registered (등록 회원) | unregistered (미등록 회원)
        exerciseTabPart: "전체", // 회원 상세 운동 탭 부위 필터
        memoOpen: false, // 회원 홈 메모 카드 펼침 여부
        calendarYear: 2026, // 달력 조회용 연도
        calendarMonth: 7, // 달력 조회용 월
      };

      const TODAY_DATE = "7.14";

      const scheduleData = {
        7.12: { weekday: "일", sessions: [] },
        7.13: {
          weekday: "월",
          sessions: [
            { time: "09:00", name: "오세라", tags: ["하체"] },
            { time: "18:00", name: "강도윤", tags: ["가슴어깨"] },
          ],
        },
        7.14: {
          weekday: "화",
          sessions: [
            { time: "07:00", name: "이서준", tags: ["하체", "복근"] },
            { time: "08:30", name: "오세라", tags: ["하체"] },
            { time: "09:30", name: "김도현", tags: ["등"] },
            { time: "10:00", name: "김민지", tags: ["가슴어깨"] },
            { time: "11:30", name: "박지성", tags: ["상담"] },
            { time: "12:30", name: "한지민", tags: ["상담"] },
            { time: "14:00", name: "최유나", tags: ["등"] },
            { time: "15:00", name: "이수빈", tags: ["가슴어깨"] },
            { time: "16:00", name: "서지우", tags: ["하체", "복근"] },
            { time: "17:00", name: "정하늘", tags: ["하체"] },
            { time: "18:00", name: "문가영", tags: ["등"] },
            { time: "19:00", name: "강도윤", tags: ["가슴어깨", "복근"] },
            { time: "20:00", name: "임채원", tags: ["상담"] },
            { time: "21:00", name: "배윤호", tags: ["하체"] },
          ],
        },
        7.15: {
          weekday: "수",
          sessions: [
            { time: "08:00", name: "정하늘", tags: ["등"] },
            { time: "11:00", name: "이영표", tags: ["상담"] },
            { time: "16:00", name: "최유나", tags: ["하체"] },
          ],
        },
        7.16: { weekday: "목", sessions: [] },
        7.17: {
          weekday: "금",
          sessions: [{ time: "11:00", name: "이서준", tags: ["가슴어깨"] }],
        },
        7.18: { weekday: "토", sessions: [] },
      };

      const routines = [
        {
          id: "lower-a",
          name: "하체 A",
          exercises: [
            { name: "스쿼트", kg: 80, rep: 5, sets: 3 },
            { name: "레그프레스", kg: 140, rep: 8, sets: 3 },
            { name: "런지", kg: 16, rep: 12, sets: 3 },
          ],
        },
        {
          id: "lower-b",
          name: "하체 B",
          exercises: [
            { name: "데드리프트", kg: 100, rep: 8, sets: 3 },
            { name: "힙쓰러스트", kg: 60, rep: 10, sets: 3 },
          ],
        },
        {
          id: "upper-basic",
          name: "초보자 상체",
          exercises: [
            { name: "벤치프레스", kg: 30, rep: 8, sets: 3 },
            { name: "랫풀다운", kg: 35, rep: 10, sets: 3 },
          ],
        },
        {
          id: "full-circuit",
          name: "전신 서킷",
          exercises: [{ name: "케틀벨 스윙", kg: 16, rep: 15, sets: 3 }],
        },
      ];

      const exerciseParts = ["전체", "등", "가슴어깨", "하체", "복근"];

      // type: weight(kg+회) | reps(회만) | time(시간만)
      const exerciseCatalog = [
        { name: "벤치프레스", part: "가슴어깨", type: "weight" },
        { name: "인클라인 벤치프레스", part: "가슴어깨", type: "weight" },
        { name: "덤벨 플라이", part: "가슴어깨", type: "weight" },
        { name: "푸시업", part: "가슴어깨", type: "reps" },
        { name: "숄더프레스", part: "가슴어깨", type: "weight" },
        { name: "사이드 레터럴 레이즈", part: "가슴어깨", type: "weight" },
        { name: "트라이셉스 푸시다운", part: "가슴어깨", type: "weight" },
        { name: "딥스", part: "가슴어깨", type: "reps" },
        { name: "데드리프트", part: "등", type: "weight" },
        { name: "바벨 로우", part: "등", type: "weight" },
        { name: "풀업", part: "등", type: "reps" },
        { name: "랫풀다운", part: "등", type: "weight" },
        { name: "시티드 로우", part: "등", type: "weight" },
        { name: "페이스풀", part: "등", type: "weight" },
        { name: "바벨 컬", part: "등", type: "weight" },
        { name: "해머 컬", part: "등", type: "weight" },
        { name: "스쿼트", part: "하체", type: "weight" },
        { name: "레그프레스", part: "하체", type: "weight" },
        { name: "런지", part: "하체", type: "weight" },
        { name: "레그컬", part: "하체", type: "weight" },
        { name: "레그익스텐션", part: "하체", type: "weight" },
        { name: "카프레이즈", part: "하체", type: "weight" },
        { name: "루마니안 데드리프트", part: "하체", type: "weight" },
        { name: "힙쓰러스트", part: "하체", type: "weight" },
        { name: "케틀벨 스윙", part: "하체", type: "weight" },
        { name: "케이블 크런치", part: "복근", type: "weight" },
        { name: "플랭크", part: "복근", type: "time" },
        { name: "행잉 레그레이즈", part: "복근", type: "reps" },
      ];

      function getExerciseType(name) {
        const found = exerciseCatalog.find((e) => e.name === name);
        return found ? found.type : "weight";
      }

      function makeDefaultSet(type, base) {
        base = base || {};
        if (type === "reps") return { rep: base.rep || 10, done: false };
        if (type === "time") return { sec: base.sec || 30, done: false };
        return { kg: base.kg || 20, rep: base.rep || 10, done: false };
      }

      let exerciseIdCounter = 0;
      function nextExerciseId() {
        exerciseIdCounter += 1;
        return "ex" + exerciseIdCounter;
      }

      function makeDefaultRecordExercises() {
        return [
          {
            id: nextExerciseId(),
            name: "스쿼트",
            type: "weight",
            sets: [
              { kg: 80, rep: 5, done: true },
              { kg: 80, rep: 5, done: true },
              { kg: 75, rep: 8, done: false },
            ],
            extraOpen: true,
            hasMedia: true,
            note: "무릎 정렬 좋아짐. 다음엔 85kg 시도.",
          },
          {
            id: nextExerciseId(),
            name: "루마니안 데드리프트",
            type: "weight",
            sets: [{ kg: 60, rep: 10, done: false }],
            extraOpen: false,
            hasMedia: false,
            note: "",
          },
        ];
      }
      state.recordExercises = makeDefaultRecordExercises();

      const allMembers = [
        {
          name: "강도윤",
          gender: "m",
          info: "주 2회",
          left: 3,
          total: 10,
          warn: true,
        },
        {
          name: "김민지",
          gender: "f",
          info: "주 2회",
          left: 7,
          total: 20,
          warn: false,
        },
        {
          name: "박지성",
          gender: "m",
          info: "미등록 회원",
          left: 0,
          total: 0,
          isUnregistered: true,
        },
        {
          name: "오세라",
          gender: "f",
          info: "주 1회",
          left: 9,
          total: 12,
          warn: false,
        },
        {
          name: "이서준",
          gender: "m",
          info: "주 3회",
          left: 12,
          total: 30,
          warn: false,
        },
        {
          name: "이영표",
          gender: "m",
          info: "미등록 회원",
          left: 0,
          total: 0,
          isUnregistered: true,
        },
        {
          name: "정하늘",
          gender: "f",
          info: "주 2회",
          left: 18,
          total: 20,
          warn: false,
        },
        {
          name: "최유나",
          gender: "f",
          info: "주 2회",
          left: 2,
          total: 10,
          warn: true,
        },
      ];

      function set(patch) {
        Object.assign(state, patch);
        render();
      }

      const actions = {
        scrollToTop: () => {
          const el =
            scrollTopTarget || document.getElementById("scroll-container");
          if (el) el.scrollTo({ top: 0, behavior: "smooth" });
          const btn = document.getElementById("scroll-top-btn");
          if (btn) btn.style.display = "none";
        },
        goSchedule: () => set({ screen: "schedule", sheet: null }),
        goMembers: () => set({ screen: "members", sheet: null }),
        goProfile: () => set({ screen: "profile", sheet: null }),

        openRecord: () => set({ screen: "record", recordFrom: state.screen }),
        backRecord: () =>
          set({
            screen:
              state.recordFrom === "memberDetail" ? "memberDetail" : "schedule",
          }),
        completeRecord: () =>
          set({
            screen:
              state.recordFrom === "memberDetail" ? "memberDetail" : "schedule",
          }),

        openMember: () =>
          set({
            screen: "memberDetail",
            selectedMemberName: "김민지",
            segment: "home",
          }),
        openMemberWithName: (name) =>
          set({
            screen: "memberDetail",
            selectedMemberName: name,
            segment: "home",
          }),
        backMember: () => set({ screen: "members" }),

        openExercise: () => set({ screen: "exerciseGraph" }),
        backExercise: () => set({ screen: "memberDetail" }),

        openMyRoutines: () => set({ screen: "myRoutines" }),
        backMyRoutines: () => set({ screen: "profile" }),

        openScheduleSheet: () =>
          set({ sheet: "schedule", scheduleParts: ["하체"] }),
        openMemberSheet: () => set({ sheet: "member" }),
        openRoutineSheet: () => set({ sheet: "routine" }),
        openEditSheet: () => set({ sheet: "edit" }),
        openLoadRoutineSheet: () => set({ sheet: "loadRoutine" }),
        closeSheet: () => set({ sheet: null }),
        toggleSpeedDial: () => set({ showSpeedDial: !state.showSpeedDial }),
        closeSpeedDial: () => set({ showSpeedDial: false }),
        openMonthlyCalendar: () =>
          set({
            sheet: "monthlyCalendar",
            calendarYear: 2026,
            calendarMonth: 7,
          }),
        prevMonth: () => {
          let m = state.calendarMonth - 1;
          let y = state.calendarYear;
          if (m < 1) {
            m = 12;
            y -= 1;
          }
          set({ calendarYear: y, calendarMonth: m });
        },
        nextMonth: () => {
          let m = state.calendarMonth + 1;
          let y = state.calendarYear;
          if (m > 12) {
            m = 1;
            y += 1;
          }
          set({ calendarYear: y, calendarMonth: m });
        },
        setMemberFilter: (filter) => set({ memberFilter: filter }),
        actionSchedule: () =>
          set({
            showSpeedDial: false,
            sheet: "schedule",
            scheduleParts: ["하체"],
            otherSchedulePart: "",
            scheduleType: "session",
            consultantName: "",
            consultMemo: "",
          }),
        actionMember: () => set({ showSpeedDial: false, sheet: "member" }),
        actionRecord: () => set({ showSpeedDial: false, screen: "record" }),
        actionRoutine: () =>
          set({ showSpeedDial: false, screen: "myRoutines" }),
        setScheduleType: (type) => set({ scheduleType: type }),
        confirmSchedule: () => {
          const date = state.scheduleDate;
          if (!scheduleData[date]) {
            scheduleData[date] = { weekday: "화", sessions: [] };
          }

          if (state.scheduleType === "consult") {
            const cName = state.consultantName || "비회원";
            scheduleData[date].sessions.push({
              time: "10:00",
              name: cName,
              tags: ["상담"],
              memo: state.consultMemo,
            });
            // 미등록회원으로 회원 리스트에 존재하지 않으면 추가
            const exist = allMembers.find((m) => m.name === cName);
            if (!exist) {
              allMembers.push({
                name: cName,
                gender: "m",
                info: "미등록 회원",
                left: 0,
                total: 0,
                isUnregistered: true,
                consultMemo: state.consultMemo,
                consultPurpose: "",
              });
            }
          } else {
            const tags = [...state.scheduleParts];
            const etcIdx = tags.indexOf("기타");
            if (etcIdx !== -1 && state.otherSchedulePart) {
              tags[etcIdx] = `기타: ${state.otherSchedulePart}`;
            }
            scheduleData[date].sessions.push({
              time: "10:00",
              name: "김민지",
              tags: tags,
            });
          }

          set({
            sheet: null,
            scheduleParts: [],
            otherSchedulePart: "",
            scheduleType: "session",
            consultantName: "",
            consultMemo: "",
          });
        },
        openConsultDetailWithName: (name) => {
          let memo = "";
          let purpose = "";
          if (name === "박지성") {
            memo = "다이어트 목적, 과거 무릎 부상 이력 있음. 주 2회 상담.";
            purpose = "다이어트 및 재활";
          } else if (name === "이영표") {
            memo = "기초 체력 향상 원함. 주 3회 세션 가능 시간 문의.";
            purpose = "체력 증진";
          }
          const memObj = allMembers.find((m) => m.name === name);
          if (memObj) {
            if (memObj.consultMemo) memo = memObj.consultMemo;
            if (memObj.consultPurpose) purpose = memObj.consultPurpose;
          }
          set({
            screen: "consultDetail",
            consultTargetName: name,
            consultTargetMemo: memo,
            consultTargetPurpose: purpose,
            recordFrom: state.screen,
          });
        },
        backConsultDetail: () => {
          set({
            screen: state.recordFrom === "members" ? "members" : "schedule",
          });
        },
        completeConsult: () => {
          const memObj = allMembers.find(
            (m) => m.name === state.consultTargetName,
          );
          if (memObj) {
            memObj.consultMemo = state.consultTargetMemo;
            memObj.consultPurpose = state.consultTargetPurpose;
          }
          set({
            screen: state.recordFrom === "members" ? "members" : "schedule",
          });
        },
        registerUnregisteredMember: (name) => {
          const member = allMembers.find((m) => m.name === name);
          if (member) {
            member.isUnregistered = false;
            member.info = "주 2회";
            member.left = 10;
            member.total = 10;
            member.warn = false;
          }
          set({
            screen: "memberDetail",
            selectedMemberName: name,
            segment: "home",
          });
        },

        toggleMemo: () => set({ memoOpen: !state.memoOpen }),
        setHome: () => set({ segment: "home" }),
        setDiary: () => set({ segment: "diary" }),
        setGraph: () => set({ segment: "graph" }),
        setExercise: () => set({ segment: "exercise" }),
        setRoutine: () => set({ segment: "routine" }),

        setGenderAll: () => set({ gender: "all" }),
        setGenderM: () => set({ gender: "m" }),
        setGenderF: () => set({ gender: "f" }),

        setDiarySession: () => set({ diaryFilter: "session" }),
        setDiaryBody: () => set({ diaryFilter: "body" }),
        setDiaryDiet: () => set({ diaryFilter: "diet" }),

        resetToday: () => set({ scheduleDate: TODAY_DATE }),

        addExercise: () =>
          set({
            sheet: "exercisePicker",
            exercisePicker: { part: "전체", selected: [] },
            exerciseMenu: null,
          }),

        closeExerciseMenu: () => set({ exerciseMenu: null }),

        confirmAddExercises: () => {
          const picker = state.exercisePicker;
          if (!picker || picker.selected.length === 0) return;
          if (picker.replaceTarget) {
            const target = state.recordExercises.find(
              (e) => e.id === picker.replaceTarget,
            );
            if (target) {
              const name = picker.selected[0];
              const type = getExerciseType(name);
              target.name = name;
              // 타입이 같으면 입력해둔 세트 유지, 다르면 새 타입 기본 세트로 초기화
              if (type !== target.type) {
                target.type = type;
                target.sets = [makeDefaultSet(type)];
              }
            }
            set({ sheet: null, exercisePicker: null });
            return;
          }
          picker.selected.forEach((name) => {
            const type = getExerciseType(name);
            state.recordExercises.push({
              id: nextExerciseId(),
              name,
              type,
              sets: [makeDefaultSet(type)],
              extraOpen: false,
              hasMedia: false,
              note: "",
            });
          });
          set({ sheet: null, exercisePicker: null });
        },
      };

      function addSetToExercise(exId) {
        const ex = state.recordExercises.find((e) => e.id === exId);
        if (!ex) return;
        const last = ex.sets[ex.sets.length - 1];
        ex.sets.push(makeDefaultSet(ex.type, last));
        render();
      }

      function removeSetFromExercise(exId, idx) {
        const ex = state.recordExercises.find((e) => e.id === exId);
        if (!ex || ex.sets.length <= 1) return;
        ex.sets.splice(idx, 1);
        render();
      }

      function removeExercise(exId) {
        const idx = state.recordExercises.findIndex((e) => e.id === exId);
        if (idx === -1) return;
        state.recordExercises.splice(idx, 1);
        render();
      }

      function toggleExerciseExtra(exId) {
        const ex = state.recordExercises.find((e) => e.id === exId);
        if (!ex) return;
        ex.extraOpen = !ex.extraOpen;
        render();
      }

      function loadRoutineIntoRecord(routineId) {
        const routine = routines.find((r) => r.id === routineId);
        if (!routine) return;
        routine.exercises.forEach((re) => {
          const type = getExerciseType(re.name);
          const sets = [];
          for (let i = 0; i < re.sets; i++) {
            sets.push(makeDefaultSet(type, { kg: re.kg, rep: re.rep }));
          }
          state.recordExercises.push({
            id: nextExerciseId(),
            name: re.name,
            type,
            sets,
            extraOpen: false,
            hasMedia: false,
            note: "",
          });
        });
        state.sheet = null;
        render();
      }

      function dispatch(name) {
        if (actions[name]) {
          actions[name]();
        } else if (name.startsWith("openMember:")) {
          const mName = name.split(":")[1];
          actions.openMemberWithName(mName);
        } else if (name.startsWith("selectDateFromGraph:")) {
          const d = name.split(":")[1];
          set({ selectedDate: d });
          setTimeout(() => {
            const cardEl = document.getElementById("card-" + d);
            if (cardEl) {
              cardEl.scrollIntoView({ behavior: "smooth", block: "center" });
            }
          }, 250);
        } else if (name.startsWith("setGraphPeriod:")) {
          const p = name.split(":")[1];
          set({ graphPeriod: p, selectedDate: "7.10" });
        } else if (name.startsWith("setBodyPeriod:")) {
          const p = name.split(":")[1];
          set({ bodyPeriod: p, selectedBodyDate: "7.10" });
        } else if (name.startsWith("selectBodyDate:")) {
          set({ selectedBodyDate: name.split(":")[1] });
        } else if (name.startsWith("openConsultDetail:")) {
          actions.openConsultDetailWithName(name.split(":")[1]);
        } else if (name.startsWith("registerUnregisteredMember:")) {
          actions.registerUnregisteredMember(name.split(":")[1]);
        } else if (name.startsWith("setMemberFilter:")) {
          actions.setMemberFilter(name.split(":")[1]);
        } else if (name.startsWith("selectScheduleDateAndClose:")) {
          set({ scheduleDate: name.split(":")[1], sheet: null });
        } else if (name.startsWith("setScheduleType:")) {
          set({ scheduleType: name.split(":")[1] });
        } else if (name.startsWith("selectScheduleDate:")) {
          set({ scheduleDate: name.split(":")[1] });
        } else if (name.startsWith("addSet:")) {
          addSetToExercise(name.split(":")[1]);
        } else if (name.startsWith("removeSet:")) {
          const parts = name.split(":");
          removeSetFromExercise(parts[1], parseInt(parts[2], 10));
        } else if (name.startsWith("toggleExerciseExtra:")) {
          toggleExerciseExtra(name.split(":")[1]);
        } else if (name.startsWith("loadRoutine:")) {
          loadRoutineIntoRecord(name.split(":")[1]);
        } else if (name.startsWith("setExerciseTabPart:")) {
          set({ exerciseTabPart: name.slice("setExerciseTabPart:".length) });
        } else if (name.startsWith("setExercisePickerPart:")) {
          state.exercisePicker.part = name.slice(
            "setExercisePickerPart:".length,
          );
          render();
        } else if (name.startsWith("toggleExercisePick:")) {
          const exName = name.slice("toggleExercisePick:".length);
          const picker = state.exercisePicker;
          const idx = picker.selected.indexOf(exName);
          if (picker.replaceTarget) {
            // 교체 모드: 하나만 선택 (라디오 방식)
            picker.selected = idx === -1 ? [exName] : [];
          } else if (idx === -1) {
            picker.selected.push(exName);
          } else {
            picker.selected.splice(idx, 1);
          }
          render();
        } else if (name.startsWith("toggleExerciseMenu:")) {
          const exId = name.split(":")[1];
          set({ exerciseMenu: state.exerciseMenu === exId ? null : exId });
        } else if (name.startsWith("menuDeleteExercise:")) {
          state.exerciseMenu = null;
          removeExercise(name.split(":")[1]);
        } else if (name.startsWith("toggleSchedulePart:")) {
          const part = name.slice("toggleSchedulePart:".length);
          const idx = state.scheduleParts.indexOf(part);
          if (idx === -1) state.scheduleParts.push(part);
          else state.scheduleParts.splice(idx, 1);
          render();
        } else if (name.startsWith("menuReplaceExercise:")) {
          set({
            sheet: "exercisePicker",
            exercisePicker: {
              part: "전체",
              selected: [],
              replaceTarget: name.split(":")[1],
            },
            exerciseMenu: null,
          });
        }
      }

      function segStyle(active) {
        return active
          ? "background:#FFFFFF;font-weight:700;color:#191F28"
          : "font-weight:500;color:#4E5968";
      }
      function gchip(active) {
        return active
          ? "background:#FF4E00;color:#FFFFFF;font-weight:700"
          : "background:#FFFFFF;color:#4E5968;font-weight:500";
      }
      function dchip(active) {
        return active
          ? "background:#FF4E00;color:#FFFFFF;font-weight:700"
          : "background:#FFFFFF;color:#4E5968;font-weight:500";
      }

      function isTabActive(name) {
        if (name === "schedule") return state.screen === "schedule";
        if (name === "members")
          return ["members", "memberDetail", "exerciseGraph"].includes(
            state.screen,
          );
        if (name === "profile")
          return ["profile", "myRoutines"].includes(state.screen);
        return false;
      }

      /* ---------------- 일정 탭 ---------------- */
      function renderSchedule() {
        const dateKeys = Object.keys(scheduleData);
        const current =
          scheduleData[state.scheduleDate] || scheduleData[TODAY_DATE];
        const isToday = state.scheduleDate === TODAY_DATE;

        const daysHtml = dateKeys
          .map((key) => {
            const d = scheduleData[key];
            const n = key.split(".")[1];
            const active = key === state.scheduleDate;
            const hasSession = d.sessions.length > 0;
            const dot = active
              ? "#FFFFFF"
              : hasSession
                ? "#B0B8C1"
                : "transparent";
            return `
    <div data-action="selectScheduleDate:${key}" style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 0 8px;border-radius:14px${active ? ";background:#FF4E00;box-shadow:0 4px 12px rgba(255,78,0,.3)" : ""}">
      <span style="font-size:11px;color:${active ? "#FFD3BF" : "#8B95A1"};font-weight:${active ? 600 : 400}">${d.weekday}</span>
      <span style="font-size:16px;font-weight:${active ? 800 : 700};font-variant-numeric:tabular-nums;color:${active ? "#FFFFFF" : "#191F28"}">${n}</span>
      <span style="width:4px;height:4px;border-radius:99px;background:${dot}"></span>
    </div>`;
          })
          .join("");

        function getTagStyle(t) {
          if (t === "상담") {
            return "font-size:11px;font-weight:600;color:#1B64DA;background:#E8F3FF;padding:4px 8px;border-radius:6px";
          }
          if (t === "기타" || t.startsWith("기타:")) {
            return "font-size:11px;font-weight:600;color:#4E5968;background:#E5E8EB;padding:4px 8px;border-radius:6px";
          }
          return "font-size:11px;font-weight:600;color:#6B7684;background:#F2F4F6;padding:4px 8px;border-radius:6px";
        }

        function card(s) {
          const tagsHtml = s.tags
            .map((t) => `<span style="${getTagStyle(t)}">${t}</span>`)
            .join("");
          const isConsult = s.tags.includes("상담");
          const clickAction = isConsult
            ? `openConsultDetail:${s.name}`
            : `openRecord`;
          return `
    <div data-action="${clickAction}" style="background:#FFFFFF;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px">
      <span style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:#191F28;width:64px">${s.time}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px"><span style="font-size:16px;font-weight:700;color:#191F28">${s.name}</span><div style="display:flex;gap:4px">${tagsHtml}</div></div>
    </div>`;
        }

        const morning = current.sessions.filter(
          (s) => parseInt(s.time, 10) < 12,
        );
        const afternoon = current.sessions.filter(
          (s) => parseInt(s.time, 10) >= 12,
        );

        let listHtml;
        if (current.sessions.length === 0) {
          listHtml = `<div style="padding:140px 0;text-align:center;font-size:13px;color:#8B95A1">일정이 없습니다</div>`;
        } else {
          listHtml = "";
          if (morning.length) {
            listHtml += `<div style="font-size:12px;font-weight:600;color:#8B95A1;padding:6px 4px 0">오전</div>`;
            listHtml += morning.map(card).join("");
          }
          if (isToday && morning.length && afternoon.length) {
            listHtml += `
      <div style="display:flex;align-items:center;gap:8px;padding:2px 4px">
        <span style="font-size:11px;font-weight:700;color:#E63E00;font-variant-numeric:tabular-nums">13:12</span>
        <span style="flex:1;height:2px;background:#E63E00;border-radius:2px;opacity:.4"></span>
      </div>`;
          }
          if (afternoon.length) {
            listHtml += `<div style="font-size:12px;font-weight:600;color:#8B95A1;padding:2px 4px 0">오후</div>`;
            listHtml += afternoon.map(card).join("");
          }
        }

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div id="scroll-container" class="no-scrollbar" style="flex:1;overflow-y:auto;display:flex;flex-direction:column">
      <div style="padding:20px 24px 0;display:flex;align-items:flex-end;justify-content:space-between">
        <div style="display:flex;align-items:baseline;gap:10px">
          <span style="font-size:44px;font-weight:800;color:#191F28;letter-spacing:-1.5px">${state.scheduleDate}</span>
          <span style="font-size:20px;font-weight:600;color:#191F28">${current.weekday}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-bottom:8px">
          <span data-action="resetToday" style="font-size:13px;font-weight:600;color:#4E5968;background:#FFFFFF;padding:7px 14px;border-radius:999px">오늘</span>
          <span data-action="openMonthlyCalendar" style="width:32px;height:32px;border-radius:999px;background:#FFFFFF;display:flex;align-items:center;justify-content:center;color:#4E5968;font-size:11px;cursor:pointer">▾</span>
        </div>
      </div>
      <div style="position:sticky;top:0;z-index:5;background:#f2f4f6;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:16px 20px 10px">${daysHtml}</div>
      <div style="padding:0 20px 140px;display:flex;flex-direction:column;gap:8px">
        ${listHtml}
      </div>
    </div>
  </div>`;
      }

      /* ---------------- PT 수업 기록 ---------------- */
      function exerciseCard(ex) {
        const rot = ex.extraOpen ? "90deg" : "0deg";
        const showDelete = ex.sets.length > 1;
        const type = ex.type || "weight";
        const gridCols =
          type === "weight" ? "28px 1fr 1fr 24px" : "28px 1fr 24px";

        const headerCells =
          type === "weight"
            ? `<span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">세트</span>
        <span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">kg</span>
        <span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">회</span>
        <span></span>`
            : type === "time"
              ? `<span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">세트</span>
        <span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">시간</span>
        <span></span>`
              : `<span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">세트</span>
        <span style="font-size:12px;font-weight:600;color:#8B95A1;text-align:center">회</span>
        <span></span>`;

        const rowsHtml = ex.sets
          .map((r, idx) => {
            const valueCell =
              type === "weight"
                ? `<span style="background:#F2F4F6;border-radius:10px;padding:11px 14px;font-size:16px;font-weight:${r.done ? 700 : 400};font-variant-numeric:tabular-nums;color:${r.done ? "#191F28" : "#8B95A1"};text-align:center">${r.kg}</span>
      <span style="background:#F2F4F6;border-radius:10px;padding:11px 14px;font-size:16px;font-weight:${r.done ? 700 : 400};font-variant-numeric:tabular-nums;color:${r.done ? "#191F28" : "#8B95A1"};text-align:center">${r.rep}</span>`
                : type === "time"
                  ? `<span style="background:#F2F4F6;border-radius:10px;padding:11px 14px;font-size:16px;font-weight:${r.done ? 700 : 400};font-variant-numeric:tabular-nums;color:${r.done ? "#191F28" : "#8B95A1"};text-align:center">${r.sec}초</span>`
                  : `<span style="background:#F2F4F6;border-radius:10px;padding:11px 14px;font-size:16px;font-weight:${r.done ? 700 : 400};font-variant-numeric:tabular-nums;color:${r.done ? "#191F28" : "#8B95A1"};text-align:center">${r.rep}</span>`;
            return `
    <div style="display:grid;grid-template-columns:${gridCols};gap:8px;align-items:center">
      <span style="font-size:12px;color:#8B95A1;font-variant-numeric:tabular-nums;text-align:center">${idx + 1}</span>
      ${valueCell}
      ${
        showDelete
          ? `<span data-action="removeSet:${ex.id}:${idx}" style="width:24px;height:24px;border-radius:999px;background:#F2F4F6;display:flex;align-items:center;justify-content:center;color:#8B95A1;font-size:11px;cursor:pointer">✕</span>`
          : `<span style="width:24px;height:24px"></span>`
      }
    </div>`;
          })
          .join("");

        const extraBody = ex.extraOpen
          ? ex.hasMedia
            ? `
      <div style="display:flex;gap:8px;overflow-x:auto">
        <span style="width:64px;height:64px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:ui-monospace,monospace;color:#8B95A1;flex-shrink:0">img</span>
        <span style="width:64px;height:64px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:ui-monospace,monospace;color:#8B95A1;flex-shrink:0">▶</span>
        <span style="width:64px;height:64px;border-radius:10px;border:1.5px dashed #B0B8C1;display:flex;align-items:center;justify-content:center;font-size:20px;color:#8B95A1;flex-shrink:0">+</span>
      </div>
      <div style="font-size:13px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:10px 14px">${ex.note}</div>`
            : `
      <div style="display:flex;gap:16px">
        <span style="font-size:13px;font-weight:600;color:#8B95A1">+ 사진</span>
        <span style="font-size:13px;font-weight:600;color:#8B95A1">+ 메모</span>
      </div>`
          : "";

        const menuOpen = state.exerciseMenu === ex.id;
        const menuHtml = menuOpen
          ? `
      <div style="position:absolute;top:30px;right:0;z-index:10;background:#FFFFFF;border-radius:12px;box-shadow:0 4px 20px rgba(25,31,40,.16);padding:6px;min-width:160px;display:flex;flex-direction:column">
        <span data-action="menuReplaceExercise:${ex.id}" style="font-size:14px;font-weight:500;color:#191F28;padding:11px 14px;border-radius:8px;cursor:pointer">다른 운동으로 바꾸기</span>
        <span data-action="menuDeleteExercise:${ex.id}" style="font-size:14px;font-weight:500;color:#D6284A;padding:11px 14px;border-radius:8px;cursor:pointer">운동 삭제</span>
      </div>`
          : "";

        return `
  <div style="background:#FFFFFF;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative">
      <span style="font-size:16px;font-weight:700;color:#191F28">${ex.name}</span>
      <span data-action="toggleExerciseMenu:${ex.id}" style="width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#8B95A1;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;letter-spacing:1px${menuOpen ? ";background:#F2F4F6" : ""}">⋮</span>
      ${menuHtml}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:grid;grid-template-columns:${gridCols};gap:8px;align-items:center">
        ${headerCells}
      </div>
      ${rowsHtml}
    </div>
    <div style="display:flex;justify-content:center;padding:2px 0">
      <span data-action="addSet:${ex.id}" style="font-size:13px;font-weight:600;color:#E63E00;cursor:pointer">＋ 세트 추가</span>
    </div>
    <div style="height:1px;background:#EFF2F5;margin:0 -20px"></div>
    <div data-action="toggleExerciseExtra:${ex.id}" style="display:flex;align-items:center;gap:6px">
      <span style="font-size:13px;font-weight:600;color:#4E5968">사진 · 메모</span>
      ${ex.hasMedia ? '<span style="font-size:11px;color:#8B95A1;background:#F2F4F6;border-radius:6px;padding:1px 6px">2</span>' : ""}
      <span style="margin-left:auto;font-size:14px;color:#8B95A1;display:inline-flex;transform:rotate(${rot});transition:transform .2s">›</span>
    </div>
    ${extraBody}
  </div>`;
      }

      function renderRecord() {
        const exercisesHtml = state.recordExercises
          .map((ex) => exerciseCard(ex))
          .join("");
        const menuClickAway = state.exerciseMenu
          ? `<div data-action="closeExerciseMenu" style="position:absolute;inset:0;z-index:5"></div>`
          : "";
        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">

    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">

    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:8px">
        <span data-action="openLoadRoutineSheet" style="flex:1;background:#FFE9E0;color:#E63E00;font-size:14px;font-weight:700;padding:13px 0;border-radius:14px;text-align:center;cursor:pointer">루틴 불러오기</span>
        <span data-action="addExercise" style="flex:1;background:#FFFFFF;color:#191F28;font-size:14px;font-weight:600;padding:13px 0;border-radius:14px;text-align:center;cursor:pointer">+ 운동 추가</span>
      </div>
      ${exercisesHtml}
      <div data-action="addExercise" style="border-radius:14px;padding:16px 0;text-align:center;cursor:pointer;background-color:white;background-image:url(&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' fill='none' rx='14' ry='14' stroke='%23FF4E00' stroke-width='1.5' stroke-dasharray='6 5' stroke-linecap='round'/%3E%3C/svg%3E&quot;)"><span style="font-size:14px;font-weight:700;color:#FF4E00">＋ 운동 추가</span></div>
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:700;color:#191F28">메모</span>
        <span style="font-size:14px;color:#B0B8C1">오늘 컨디션, 다음 수업 계획…</span>
      </div>
    </div>
    <div style="padding:12px 20px 32px">
      <div data-action="completeRecord" style="background:#FF4E00;border-radius:14px;padding:17px 0;text-align:center;box-shadow:0 6px 16px rgba(255,78,0,.3)"><span style="color:#fff;font-size:16px;font-weight:700">기록 완료</span></div>
    </div>
  </div>`;
      }

      function renderConsultDetail() {
        const member = allMembers.find(
          (m) => m.name === state.consultTargetName,
        );
        const hasRecord = !!(
          member &&
          (member.consultMemo || member.consultPurpose)
        );
        const registerBtn =
          member && member.isUnregistered && hasRecord
            ? `
            <div data-action="registerUnregisteredMember:${state.consultTargetName}" style="background:#FFFFFF;border-radius:14px;padding:17px 0;text-align:center;cursor:pointer;margin-bottom:12px;border:1.5px solid #FF4E00;box-shadow:0 4px 12px rgba(25,31,40,0.04)">
              <span style="color:#FF4E00;font-size:16px;font-weight:700">회원으로 등록</span>
            </div>`
            : "";
        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backConsultDetail" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:16px;font-weight:700;color:#191F28">상담 기록 <span style="color:#4E5968;font-weight:500">· ${state.consultTargetName}</span></span>
    </div>
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:12px">
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:700;color:#191F28">방문 목적</span>
        <input type="text" placeholder="예: 체중 감량, 재활 등" value="${state.consultTargetPurpose || ""}" oninput="state.consultTargetPurpose = this.value" style="width:100%;border:none;background:#F2F4F6;border-radius:10px;padding:12px 16px;font-size:14px;color:#191F28;outline:none" />
      </div>
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px">
        <span style="font-size:14px;font-weight:700;color:#191F28">상담 특이사항 및 메모</span>
        <textarea placeholder="과거 부상 부위, 운동 경험, 회원님 요구사항 등 상세 메모" oninput="state.consultTargetMemo = this.value" style="width:100%;height:140px;border:none;background:#F2F4F6;border-radius:10px;padding:12px 16px;font-size:14px;color:#191F28;outline:none;resize:none">${state.consultTargetMemo || ""}</textarea>

    </div>
  </div>`;
      }

      /* ---------------- 회원 목록 ---------------- */
      function renderMembers() {
        const members = allMembers
          .filter((m) => {
            const genderOk =
              state.gender === "all" || m.gender === state.gender;
            const statusOk =
              state.memberFilter === "unregistered"
                ? m.isUnregistered
                : !m.isUnregistered;
            return genderOk && statusOk;
          })
          .map((m) => ({
            ...m,
            initial: m.name[0],
            leftStr: String(m.left),
            totalStr: "/" + m.total,
            leftColor: m.warn ? "#D6284A" : "#191F28",
            avBg: m.gender === "m" ? "#E8F3FF" : "#FFE9E0",
            avFg: m.gender === "m" ? "#1B64DA" : "#E63E00",
          }));

        const rows = members
          .map((m) => {
            const countHtml = m.isUnregistered
              ? `<span style="font-size:13px;font-weight:600;color:#8B95A1">미등록</span>`
              : `<span style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:${m.leftColor}">${m.leftStr}<span style="font-size:13px;font-weight:500;color:#8B95A1">${m.totalStr}</span></span>`;
            const clickAction = m.isUnregistered
              ? `openConsultDetail:${m.name}`
              : `openMember:${m.name}`;
            const infoHtml = m.isUnregistered
              ? ""
              : `<span style="font-size:12px;color:#8B95A1">${m.info}</span>`;
            return `
    <div data-action="${clickAction}" style="background:#FFFFFF;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;min-height:76px">
      <span style="width:44px;height:44px;border-radius:999px;background:${m.avBg};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:${m.avFg};flex-shrink:0">${m.initial}</span>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px"><span style="font-size:17px;font-weight:700;color:#191F28">${m.name}</span>${infoHtml}</div>
      ${countHtml}
    </div>`;
          })
          .join("");

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
    <div style="padding:56px 20px 0;display:flex;flex-direction:column;gap:12px">
      <div style="background:#FFFFFF;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px">
        <span style="width:14px;height:14px;border-radius:999px;border:2px solid #8B95A1;position:relative;flex-shrink:0"><span style="position:absolute;width:2px;height:6px;background:#8B95A1;bottom:-4px;right:-2px;transform:rotate(-45deg);border-radius:2px"></span></span>
        <span style="font-size:14px;color:#8B95A1">회원 이름 검색</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="display:flex;gap:6px;flex:1">
          <span data-action="setMemberFilter:registered" style="font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;${gchip(state.memberFilter === "registered")}">등록 회원</span>
          <span data-action="setMemberFilter:unregistered" style="font-size:13px;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;${gchip(state.memberFilter === "unregistered")}">미등록 회원</span>
        </div>
        <select onchange="dispatch(this.value)" style="border:1.5px solid #EFF2F5;background:#FFFFFF;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600;color:#4E5968;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
          <option value="setGenderAll" ${state.gender === "all" ? "selected" : ""}>성별 전체 ▾</option>
          <option value="setGenderM" ${state.gender === "m" ? "selected" : ""}>남성 ▾</option>
          <option value="setGenderF" ${state.gender === "f" ? "selected" : ""}>여성 ▾</option>
        </select>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 24px 2px">
      <span style="font-size:13px;font-weight:700;color:#8B95A1">${members.length}명</span>
    </div>
    <div style="flex:1;overflow:auto;padding:4px 20px 140px;display:flex;flex-direction:column;gap:8px">${rows}</div>
  </div>`;
      }

      /* ---------------- 회원 상세 ---------------- */
      function diaryStatText(kg, rep, sets) {
        return `${kg}kg · ${rep}회 · ${sets}세트`;
      }

      function diaryExerciseRow(name, statText) {
        return `
        <div data-action="openExercise" style="display:flex;align-items:center;gap:8px;padding:10px 0">
          <span style="flex:1;font-size:14px;font-weight:700;color:#191F28">${name}</span>
          <span style="font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:#8B95A1;white-space:nowrap">${statText}</span>
          <span style="font-size:14px;color:#B0B8C1;flex-shrink:0;line-height:1">›</span>
        </div>`;
      }

      function diarySessionCard(date, rowsHtml, note) {
        return `
    <div style="background:#FFFFFF;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:12px">
      <span style="font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:#8B95A1">${date}</span>
      <div style="display:flex;flex-direction:column">${rowsHtml}</div>
      <div style="font-size:13px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:12px 14px">${note}</div>
    </div>`;
      }

      function renderHomeTab() {
        const member =
          allMembers.find((m) => m.name === state.selectedMemberName) || {};
        const purpose = member.consultPurpose || "근력 증진 및 체질 개선";
        const memo =
          member.consultMemo ||
          "오른쪽 무릎 슬개골 연골 연화증 이력 있음. 런지 등 무릎 굽힘 각도가 깊은 하체 프레스 시 통증 피드백 필요.";

        const nameVal = member.name || state.selectedMemberName || "회원";
        const genderText = member.gender === "m" ? "남성" : "여성";
        const genderBg = member.gender === "m" ? "#E8F3FF" : "#FFE9E0";
        const genderColor = member.gender === "m" ? "#1B64DA" : "#E63E00";

        const left = member.left || 7;
        const total = member.total || 20;
        const done = total - left; // 진행한 회차

        return `

          <span style="font-size:26px;font-weight:800;color:#191F28;letter-spacing:-0.3px">${nameVal}</span>
          <span style="background:${genderBg};color:${genderColor};font-size:13px;font-weight:700;padding:3px 9px;border-radius:6px">${genderText}</span>
        </div>
        <div style="display:flex;gap:8px">
          <span data-action="openEditSheet" style="width:40px;height:40px;border-radius:999px;background:#FFFFFF;border:1px solid #EFF2F5;display:flex;align-items:center;justify-content:center;cursor:pointer">
            <svg viewBox="0 0 24 24" style="width:18px;height:18px" fill="none" stroke="#4E5968" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>
          </span>
          <span style="width:40px;height:40px;border-radius:999px;background:#FFFFFF;border:1px solid #EFF2F5;display:flex;align-items:center;justify-content:center;cursor:pointer">

          </span>
        </div>
      </div>

      <!-- 세션 통합 카드: 제목 + 진행 횟수 + 이전/다음 -->
      <div style="background:#FFFFFF;border-radius:24px;padding:28px 24px;box-shadow:0 2px 8px rgba(25,31,40,0.04);display:flex;flex-direction:column;gap:26px">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:16px;font-weight:600;color:#6B7684">수업</span>
            <span style="font-size:22px;font-weight:800;color:#FF4E00;font-variant-numeric:tabular-nums">${done}<span style="font-size:14px;color:#8B95A1;font-weight:600"> / ${total}회 진행</span></span>
          </div>
          <div style="height:6px;border-radius:99px;background:#F2F4F6;overflow:hidden">
            <div style="width:${donePct}%;height:100%;border-radius:99px;background:#FF4E00"></div>
          </div>
        </div>
        <!-- 박스 안에 박스: 이전/다음 수업 -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div data-action="setDiary" style="background:#F5F6F8;border-radius:18px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;cursor:pointer">
            <span style="font-size:14px;color:#8B95A1">이전 수업</span>
            <span style="font-size:17px;font-weight:700;color:#191F28;line-height:1.3">스쿼트 외 2</span>
            <span style="font-size:13px;color:#8B95A1;font-variant-numeric:tabular-nums">${done}회차 · 7.10</span>
          </div>
          <div data-action="setRoutine" style="background:#F5F6F8;border-radius:18px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;cursor:pointer">
            <span style="font-size:14px;font-weight:600;background:linear-gradient(90deg,#FF8A3D,#FF4E00);-webkit-background-clip:text;background-clip:text;color:transparent">다음 수업</span>
            <span style="font-size:17px;font-weight:700;color:#191F28;line-height:1.3">상체 기본 루틴</span>
            <span style="font-size:13px;color:#8B95A1;font-variant-numeric:tabular-nums">${done + 1}회차 · 7.14 예정</span>
          </div>
        </div>
      </div>

      <!-- 신체 정보 카드: 박스 안에 박스 -->
      <div data-action="setGraph" style="background:#FFFFFF;border-radius:24px;padding:28px 24px;box-shadow:0 2px 8px rgba(25,31,40,0.04);display:flex;flex-direction:column;gap:20px;cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:16px;font-weight:600;color:#6B7684">신체 정보</span>
          <span style="font-size:14px;color:#8B95A1;font-variant-numeric:tabular-nums">7.10 측정</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          <div style="background:#F5F6F8;border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;gap:10px">
            <span style="font-size:14px;color:#8B95A1">체중</span>
            <span style="font-size:17px;font-weight:700;color:#191F28;font-variant-numeric:tabular-nums;line-height:1.3">56.4<span style="font-size:13px;font-weight:500;color:#8B95A1"> kg</span></span>
          </div>
          <div style="background:#F5F6F8;border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;gap:10px">
            <span style="font-size:14px;color:#8B95A1">골격근량</span>
            <span style="font-size:17px;font-weight:700;color:#191F28;font-variant-numeric:tabular-nums;line-height:1.3">22.8<span style="font-size:13px;font-weight:500;color:#8B95A1"> kg</span></span>
          </div>
          <div style="background:#F5F6F8;border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;gap:10px">
            <span style="font-size:14px;color:#8B95A1">체지방률</span>
            <span style="font-size:17px;font-weight:700;color:#191F28;font-variant-numeric:tabular-nums;line-height:1.3">28.5<span style="font-size:13px;font-weight:500;color:#8B95A1"> %</span></span>
          </div>
        </div>
      </div>

      <!-- 메모 카드: 기본 접힘, 탭하면 펼침 -->
      <div style="background:#FFFFFF;border-radius:24px;padding:28px 24px;box-shadow:0 2px 8px rgba(25,31,40,0.04);display:flex;flex-direction:column;gap:${state.memoOpen ? "20px" : "14px"}">

          <span style="font-size:16px;font-weight:600;color:#6B7684">메모</span>
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;transform:rotate(${state.memoOpen ? "180deg" : "0deg"});transition:transform 0.2s" fill="none" stroke="#B0B8C1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        ${
          state.memoOpen
            ? `
        <div>
          <div style="font-size:14px;font-weight:700;color:#333D4B;margin-bottom:6px">운동 목표</div>
          <div style="font-size:15px;color:#4E5968;line-height:1.6">${purpose}</div>
        </div>
        <div style="height:1px;background:#F2F4F6"></div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#333D4B;margin-bottom:6px">주의 및 특이사항</div>
          <div style="font-size:15px;color:#4E5968;line-height:1.6">${memo}</div>
        </div>`
            : `
        <div data-action="toggleMemo" style="font-size:15px;color:#8B95A1;line-height:1.5;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${purpose}</div>`
        }
      </div>
    </div>`;
      }

      function diarySessionRow(date, rowsHtml, note) {
        return `
          <div style="padding:18px 20px;display:flex;flex-direction:column;gap:12px;background:#FFFFFF">
            <span style="font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:#8B95A1">${date}</span>
            <div style="display:flex;flex-direction:column">${rowsHtml}</div>
            <div style="font-size:14px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:12px 14px">${note}</div>
          </div>`;
      }

      function renderDiaryTab() {
        const member =
          allMembers.find((m) => m.name === state.selectedMemberName) || {};

        let contentHtml = "";

        if (state.diaryFilter === "session") {
          // 7월 세션 데이터
          const julyRows = [
            diarySessionRow(
              "7.10 금",
              diaryExerciseRow("스쿼트", diaryStatText(80, 5, 5)) +
                diaryExerciseRow("레그프레스", diaryStatText(140, 8, 3)) +
                diaryExerciseRow("런지", diaryStatText(16, 12, 3)),
              "스쿼트 깊이 좋아짐. 다음엔 85kg 시도. 무릎 정렬 계속 체크.",
            ),
            diarySessionRow(
              "7.7 화",
              diaryExerciseRow("랫풀다운", diaryStatText(45, 10, 3)) +
                diaryExerciseRow("시티드 로우", diaryStatText(40, 8, 3)),
              "랫풀다운 자세 교정 위주로 진행. 광배근 자극 느끼기 시작함.",

          // 6월 세션 데이터

            diarySessionRow(

                <div style="display:flex;align-items:center;gap:8px">
                  <span style="background:#E8F3FF;color:#1B64DA;font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px">최초 방문 상담</span>

          `;
        } else if (state.diaryFilter === "body") {
          const julyRows = [
            `
            <div style="padding:18px 20px;display:flex;flex-direction:column;gap:10px;background:#FFFFFF">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:#8B95A1">7.8 수</span>
              </div>
              <div style="display:flex;gap:8px">
                <span style="width:64px;height:64px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:ui-monospace,monospace;color:#8B95A1">img</span>

              <div style="display:flex;gap:10px">
                <span style="width:44px;height:44px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:ui-monospace,monospace;color:#8B95A1">img</span>

          contentHtml = `

              ${julyRows.join('<div style="height:1px;background:#F2F4F6;margin:0 20px"></div>')}

      function getDeltaStr(latestVal, oldestVal, unit) {
        const diff = latestVal - oldestVal;
        const sign = diff > 0 ? "+" : diff < 0 ? "−" : "";
        return `${sign}${Math.abs(diff).toFixed(1)}${unit}`;
      }

      function getPolylinePoints(records, key) {
        const N = records.length;
        const vals = records.map((r) => r[key]);
        const minVal = Math.min(...vals);
        const maxVal = Math.max(...vals);
        const valRange = maxVal - minVal || 1.0;

        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const coords = records.map((r, i) => {
          const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
          const y = 80 - ((r[key] - minVal) / valRange) * 72; // y between 8 and 80
          return { x, y };
        });

        return [...coords]
          .reverse()
          .map((c) => `${c.x},${c.y}`)
          .join(" ");
      }

      function renderBodyChartCard(label, key, unit) {
        let filtered = bodyRecords;
        if (state.bodyPeriod === "1m") {
          filtered = bodyRecords.slice(0, 4);
        } else if (state.bodyPeriod === "3m") {
          filtered = bodyRecords.slice(0, 7);
        }

        const N = filtered.length;

        // Find selected record (fall back to latest record)
        let selectedRec = filtered.find(
          (r) => r.date === state.selectedBodyDate,
        );
        if (!selectedRec) {
          selectedRec = filtered[0];
        }

        const valToShow = selectedRec[key];
        const oldestVal = filtered[filtered.length - 1][key];
        const deltaStr = getDeltaStr(
          valToShow,
          oldestVal,
          unit === "%" ? "%p" : unit,
        );
        const pointsStr = getPolylinePoints(filtered, key);

        const viewBoxWidth = N > 7 ? (N - 1) * 50 + 30 : 310;
        const svgWidth = N > 7 ? `calc(100% * ${(N - 1) / 6})` : "100%";

        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const xLabelsHtml = filtered
          .map((r, i) => {
            const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
            const isSelected = r.date === selectedRec.date;
            return `<text x="${x}" y="106" text-anchor="middle" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" fill="${isSelected ? "#191F28" : "#8B95A1"}" font-weight="${isSelected ? "700" : "500"}" font-variant-numeric="tabular-nums" style="cursor:pointer" data-action="selectBodyDate:${r.date}">${r.date}</text>`;
          })
          .join("");

        const circlesHtml = filtered
          .map((r, i) => {
            const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
            const vals = filtered.map((item) => item[key]);
            const minVal = Math.min(...vals);
            const maxVal = Math.max(...vals);
            const valRange = maxVal - minVal || 1.0;
            const y = 80 - ((r[key] - minVal) / valRange) * 72;

            const isSelected = r.date === selectedRec.date;
            if (isSelected) {
              return `
                <circle cx="${x}" cy="${y}" r="6" fill="#FFE9E0" stroke="#FF4E00" stroke-width="2" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>

                <circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
              `;
            } else {
              return `
                <circle cx="${x}" cy="${y}" r="3.5" fill="#FF4E00" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
                <circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectBodyDate:${r.date}"></circle>
              `;
            }
          })
          .join("");

        return `
  <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:baseline;gap:8px">
      <span style="font-size:14px;font-weight:700;color:#191F28">${label}</span>
      <span style="margin-left:auto;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:#191F28">${valToShow}<span style="font-size:12px;font-weight:500;color:#4E5968">${unit}</span></span>

      <div style="width: ${svgWidth}; min-width: 100%">

            { kg: 50, rep: 12 },
            { kg: 50, rep: 12 },
            { kg: 45, rep: 12 },
          ],
          memo: "",
          media: false,
        },
        {
          date: "3.2",
          title: "3월 2일",
          sets: [
            { kg: 45, rep: 12 },
            { kg: 45, rep: 12 },
            { kg: 40, rep: 12 },
          ],
          memo: "첫 측정. 하체 기초 근력 테스팅.",
          media: false,
        },
      ];

      // static coordinates for mapping weights to Y positions (60kg = 112, 80kg = 34)
      function getWeightY(kg) {
        const minKg = 60,
          maxKg = 80;
        const minY = 112,
          maxY = 34;
        if (kg <= minKg) return minY;
        if (kg >= maxKg) return maxY;
        return minY - ((kg - minKg) / (maxKg - minKg)) * (minY - maxY);
      }

      function renderExerciseGraph() {
        // 1. 기간에 따른 데이터 필터링
        let filteredRecords = squatRecords;
        if (state.graphPeriod === "1m") {
          filteredRecords = squatRecords.slice(0, 4); // 7.10, 7.3, 6.26, 6.19
        } else if (state.graphPeriod === "3m") {
          filteredRecords = squatRecords.slice(0, 7); // 7.10 to 5.12
        }

        // 2. 데이터 개수(N)에 따른 X좌표 동적 분배 (N > 7일 경우 7개가 화면에 꽉 차게 가로 폭 설정)
        const N = filteredRecords.length;
        const xStart = 15;
        const xEnd = N > 7 ? 15 + (N - 1) * 50 : 295;
        const dx = N > 1 ? (xEnd - xStart) / (N - 1) : 0;

        const recordsWithX = filteredRecords.map((r, i) => {
          const x = N > 1 ? xEnd - i * dx : (xStart + xEnd) / 2;
          const y = getWeightY(r.sets[0].kg); // top set weight maps to Y
          return { ...r, x, y };
        });

        // 3. 선택된 날짜 레코드 탐색
        let selectedRec = recordsWithX.find(
          (r) => r.date === state.selectedDate,
        );
        if (!selectedRec) {
          selectedRec = recordsWithX[0];
        }

        // 4. SVG 요소 렌더링
        // polyline 포인트 문자열
        const pointsStr = [...recordsWithX]
          .reverse()
          .map((r) => `${r.x},${r.y}`)
          .join(" ");

        // 각 포인트 circle들
        const circlesHtml = recordsWithX
          .map((r) => {
            const isSelected = r.date === selectedRec.date;
            if (isSelected) {
              return `
        <circle cx="${r.x}" cy="${r.y}" r="6" fill="#FFE9E0" stroke="#FF4E00" stroke-width="2" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}"></circle>
        <circle cx="${r.x}" cy="${r.y}" r="2.5" fill="#FF4E00" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}"></circle>
        <circle cx="${r.x}" cy="${r.y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}"></circle>
      `;
            } else {
              return `
        <circle cx="${r.x}" cy="${r.y}" r="3.5" fill="#FF4E00" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}"></circle>
        <circle cx="${r.x}" cy="${r.y}" r="14" fill="transparent" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}"></circle>
      `;
            }
          })
          .join("");

        // X축 라벨들 렌더링
        const xLabelsHtml = recordsWithX
          .map(
            (r) => `
    <text x="${r.x}" y="145" text-anchor="middle" font-size="12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" fill="#8B95A1" font-variant-numeric="tabular-nums" style="cursor:pointer" data-action="selectDateFromGraph:${r.date}">${r.date}</text>
  `,
          )
          .join("");

        // 5. 리스트 전체 렌더링
        const listHtml = recordsWithX
          .map((r) => {
            const isSelected = r.date === selectedRec.date;

            return `
    <div id="card-${r.date}" style="background:#FFFFFF;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:12px;transition:all 0.2s;border:2px solid ${isSelected ? "#FF4E00" : "transparent"};box-shadow:${isSelected ? "0 4px 12px rgba(255,78,0,0.08)" : "none"};">
      <div style="display:flex;align-items:center;justify-content:between">
        <span style="font-size:16px;font-weight:700;color:#191F28">${r.title}</span>
      </div>
      <!-- 컴팩트 인라인 미니 칩 표시 -->
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${r.sets
          .map(
            (s, idx) => `
          <span style="font-size:12px;color:#4E5968;background:#F2F4F6;padding:6px 10px;border-radius:8px;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center">
            <span>${s.kg}kg × ${s.rep}</span>
          </span>
        `,
          )
          .join("")}
      </div>
      ${r.memo ? `<div style="font-size:14px;line-height:1.6;color:#4E5968;background:#F2F4F6;border-radius:10px;padding:10px 14px">${r.memo}</div>` : ""}
      ${
        r.media
          ? `
        <div style="display:flex;gap:8px">
          <span style="width:56px;height:56px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:ui-monospace,monospace;color:#8B95A1">img</span>
          <span style="width:56px;height:56px;border-radius:10px;background:repeating-linear-gradient(45deg,#EFF2F5,#EFF2F5 6px,#E1E5EA 6px,#E1E5EA 12px);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:ui-monospace,monospace;color:#8B95A1">▶</span>
        </div>
      `
          : ""
      }
    </div>`;
          })
          .join("");

        // N > 7일 경우 7개가 한 화면에 뜨도록 가로 폭 비례 계산
        const viewBoxWidth = N > 7 ? (N - 1) * 50 + 30 : 310;
        const svgWidth = N > 7 ? `calc(100% * ${(N - 1) / 6})` : "100%";

        return `
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:20px 20px 12px;display:flex;align-items:center;gap:12px">
      <span data-action="backExercise" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px" fill="none" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </span>
      <span style="font-size:17px;font-weight:600;color:#333D4B">스쿼트</span>
    </div>
    
    <!-- 메인 스크롤 영역 -->
    <div id="scroll-container" style="flex:1;overflow:auto;padding:4px 20px 12px;display:flex;flex-direction:column;gap:8px">
      
      <!-- 기간 필터 칩 -->
      <div style="display:flex;gap:6px;padding:4px 2px">
        <span data-action="setGraphPeriod:1m" style="font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;${dchip(state.graphPeriod === "1m")}">1개월</span>
        <span data-action="setGraphPeriod:3m" style="font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;${dchip(state.graphPeriod === "3m")}">3개월</span>
        <span data-action="setGraphPeriod:6m" style="font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;${dchip(state.graphPeriod === "6m")}">6개월</span>
        <span data-action="setGraphPeriod:all" style="font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;${dchip(state.graphPeriod === "all")}">전체</span>
      </div>

      <!-- 그래프 카드 (높이 고정 및 가로 스크롤 대응) -->
      <div style="background:#FFFFFF;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;color:#191F28">${selectedRec.sets[0].kg}<span style="font-size:16px;font-weight:500;color:#4E5968">kg</span></span>
        </div>
        
        <!-- 가로 스크롤 가능 컨테이너 -->
        <div class="no-scrollbar" style="overflow-x:auto;width:100%;-webkit-overflow-scrolling:touch">
          <div style="width:${svgWidth};min-width:100%">
            <svg viewBox="0 0 ${viewBoxWidth} 155" style="width:100%;height:auto;display:block">
              <!-- Grid Lines -->
              <line x1="0" y1="130" x2="${viewBoxWidth}" y2="130" stroke="#EFF2F5" stroke-width="1"></line>
              <line x1="0" y1="72" x2="${viewBoxWidth}" y2="72" stroke="#EFF2F5" stroke-width="1"></line>
              <line x1="0" y1="14" x2="${viewBoxWidth}" y2="14" stroke="#EFF2F5" stroke-width="1"></line>
              
              <!-- Trend Line -->
              <polyline points="${pointsStr}" fill="none" stroke="#FF4E00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
              
              <!-- Interactive Circles -->
              ${circlesHtml}
              
              <!-- X-Axis Labels -->
              ${xLabelsHtml}
            </svg>
          </div>
        </div>
      </div>

      <!-- 회차별 기록 리스트 -->
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:14px;font-weight:700;color:#191F28;padding:8px 4px 4px">회차별 기록</div>
        ${listHtml}
      </div>

    </div>
  </div>`;
      }

      /* ---------------- 탭바 ---------------- */
      function renderTabbar() {
        if (
          state.screen === "record" ||
          state.screen === "consultDetail" ||
          state.screen === "exerciseGraph" ||
          state.screen === "myRoutines"
        )
          return "";

        const inactiveIconColor = "#D1D6DB";
        const inactiveTextColor = "#4E5968";
        const activeColor = "#191F28";

        if (state.screen === "memberDetail") {
          if (state.segment === "graph") return ""; // graph 상세 페이지일 때는 하단 탭바 듀오 숨김

          const h = state.segment === "home",
            d = state.segment === "diary",
            e = state.segment === "exercise",
            r = state.segment === "routine",
            g = state.segment === "graph";

          const isHomeActive = h || g; // graph 상태일 때도 홈 아이콘 활성화

          const tabStyle = (active) => `
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: ${active ? activeColor : inactiveTextColor};
            transition: color 0.15s ease;
          `;

          const iconHtml = (type, active) => {
            let br = "999px";
            if (type === "home") br = "999px 999px 0 0";
            else if (type === "diary") br = "2px";
            else if (type === "exercise") br = "999px";
            else if (type === "routine") br = "6px";
            return `<span style="width:18px;height:18px;border-radius:${br};background:${active ? activeColor : inactiveIconColor};margin-bottom:6px;transition:background-color 0.15s ease"></span>`;
          };

          return `
            <div style="position:absolute;left:20px;right:20px;bottom:24px;z-index:${state.sheet || state.showSpeedDial ? 18 : 25};display:flex;gap:8px;height:64px;pointer-events:auto">
              <!-- 뒤로가기 아일랜드 박스 (둥근 필 형태) -->
              <div data-action="goMembers" style="width:64px;height:64px;background:#FFFFFF;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(0,0,0,0.04);flex-shrink:0">
                <svg viewBox="0 0 24 24" style="width:24px;height:24px" fill="none" stroke="#4E5968" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
              </div>
              
              <!-- 서브 메뉴 탭 아일랜드 박스 (둥근 필 형태) -->
              <div style="flex:1;height:64px;background:#FFFFFF;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-around;padding:0 12px;border:1px solid rgba(0,0,0,0.04)">
                <div data-action="setHome" style="${tabStyle(isHomeActive)}">${iconHtml("home", isHomeActive)}<span>홈</span></div>
                <div data-action="setDiary" style="${tabStyle(d)}">${iconHtml("diary", d)}<span>일지</span></div>
                <div data-action="setExercise" style="${tabStyle(e)}">${iconHtml("exercise", e)}<span>운동</span></div>
                <div data-action="setRoutine" style="${tabStyle(r)}">${iconHtml("routine", r)}<span>루틴</span></div>
              </div>
            </div>
          `;
        }

        const sched = isTabActive("schedule"),
          mem = isTabActive("members"),
          prof = isTabActive("profile");
        return `
  <div style="position:relative;height:68px;background:#FFFFFF;display:grid;grid-template-columns:1fr 1fr 1fr;box-shadow:0 -4px 16px rgba(25,31,40,0.06);border-radius:20px 20px 0 0;flex-shrink:0;z-index:${state.sheet || state.showSpeedDial ? 18 : 25}">
    <div data-action="goSchedule" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0"><span style="width:20px;height:20px;border-radius:6px;background:${sched ? activeColor : inactiveIconColor};margin-bottom:6px"></span><span style="font-size:14px;font-weight:600;color:${sched ? activeColor : inactiveTextColor}">일정</span></div>
    <div data-action="goMembers" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0"><span style="width:20px;height:20px;border-radius:999px;background:${mem ? activeColor : inactiveIconColor};margin-bottom:6px"></span><span style="font-size:14px;font-weight:600;color:${mem ? activeColor : inactiveTextColor}">회원</span></div>
    <div data-action="goProfile" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:8px 0"><span style="width:20px;height:20px;border-radius:999px 999px 6px 6px;background:${prof ? activeColor : inactiveIconColor};margin-bottom:6px"></span><span style="font-size:14px;font-weight:600;color:${prof ? activeColor : inactiveTextColor}">내 정보</span></div>
  </div>`;
      }
